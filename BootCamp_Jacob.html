<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forge — Easter Boot Camp</title>
    <link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #1a1510;
            --text-primary: #e8dcc8;
            --text-secondary: #a89968;
            --accent-gold: #c9a84c;
            --card-bg: #231e17;
            --border-color: #3d3428;
            --correct: #7fb069;
            --incorrect: #c44536;
            --accent-blue: #5ca4e8;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== HEADER & NAVIGATION ===== */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-gold);
            margin: 10px 0;
        }

        .header-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 5px 0;
        }

        .header-icon {
            font-size: 3rem;
            margin: 10px 0;
        }

        .countdown {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            font-size: 1.1rem;
            color: var(--accent-blue);
            font-weight: bold;
        }

        .progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold));
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* ===== HUB VIEW ===== */
        .hub-view {
            display: block;
        }

        .day-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-card:hover:not(.locked) {
            border-color: var(--accent-gold);
            background-color: rgba(201, 168, 76, 0.1);
            transform: translateX(5px);
        }

        .day-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .day-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .day-card-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-gold);
        }

        .day-card-status {
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .status-locked {
            background-color: var(--border-color);
            color: var(--text-secondary);
        }

        .status-available {
            background-color: var(--accent-blue);
            color: white;
        }

        .status-completed {
            background-color: var(--correct);
            color: white;
        }

        .day-card-details {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .day-card-details strong {
            color: var(--accent-gold);
        }

        .unlock-link {
            color: var(--accent-blue);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 8px;
            display: inline-block;
        }

        .unlock-link:hover {
            color: var(--accent-gold);
        }

        /* ===== DAY VIEW ===== */
        .day-view {
            display: none;
        }

        .day-view.active {
            display: block;
        }

        .back-button {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--accent-gold);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            border-color: var(--accent-gold);
            background-color: rgba(201, 168, 76, 0.1);
        }

        .day-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .day-header h1 {
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        .phase-indicator {
            display: inline-block;
            background-color: var(--accent-blue);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* ===== LEARN PHASE ===== */
        .learn-phase {
            display: none;
        }

        .learn-phase.active {
            display: block;
        }

        .khan-link {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .khan-link:hover {
            border-color: var(--accent-gold);
            background-color: rgba(201, 168, 76, 0.1);
        }

        .khan-link.checked {
            border-color: var(--correct);
            background-color: rgba(127, 176, 105, 0.15);
        }

        .khan-link-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 10px;
        }

        .khan-checkbox {
            width: 24px;
            height: 24px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--correct);
        }

        .khan-content {
            flex: 1;
        }

        .khan-type {
            display: inline-block;
            background-color: var(--accent-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .khan-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        .khan-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .khan-time {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
        }

        .khan-link {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .khan-link:hover .khan-title {
            text-decoration: underline;
        }

        .start-quiz-button {
            background-color: var(--accent-gold);
            color: var(--bg-main);
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: Georgia, serif;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .start-quiz-button:hover {
            background-color: #d9b860;
            transform: scale(1.02);
        }

        .start-quiz-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .quiz-readiness {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: var(--text-secondary);
            text-align: center;
        }

        .checked-count {
            color: var(--correct);
            font-weight: bold;
        }

        /* ===== QUIZ PHASE ===== */
        .quiz-phase {
            display: none;
        }

        .quiz-phase.active {
            display: block;
        }

        .quiz-progress {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .quiz-progress-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .quiz-progress-bar {
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .quiz-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold));
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-number {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        .standard-tag {
            display: inline-block;
            background-color: rgba(92, 164, 232, 0.2);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 15px;
        }

        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            background-color: var(--bg-main);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .option:hover:not(.answered) {
            border-color: var(--accent-gold);
            background-color: rgba(201, 168, 76, 0.05);
        }

        .option.selected {
            border-color: var(--accent-gold);
            background-color: rgba(201, 168, 76, 0.15);
        }

        .option.correct {
            border-color: var(--correct);
            background-color: rgba(127, 176, 105, 0.2);
        }

        .option.incorrect {
            border-color: var(--incorrect);
            background-color: rgba(196, 69, 54, 0.2);
        }

        .option.answered {
            cursor: default;
        }

        .feedback {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback-correct {
            border-left: 4px solid var(--correct);
        }

        .feedback-incorrect {
            border-left: 4px solid var(--incorrect);
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .feedback-correct .feedback-title {
            color: var(--correct);
        }

        .feedback-incorrect .feedback-title {
            color: var(--incorrect);
        }

        .feedback-explanation {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .next-button {
            background-color: var(--accent-gold);
            color: var(--bg-main);
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
            display: none;
        }

        .next-button.show {
            display: inline-block;
        }

        .next-button:hover {
            background-color: #d9b860;
            transform: scale(1.02);
        }

        /* ===== RESULTS VIEW ===== */
        .results-view {
            display: none;
        }

        .results-view.active {
            display: block;
        }

        .results-container {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .results-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }

        .results-percentage {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .results-message {
            font-size: 1.2rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .results-breakdown {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .breakdown-label {
            font-weight: bold;
            color: var(--text-secondary);
        }

        .breakdown-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .status-mastered {
            background-color: rgba(127, 176, 105, 0.3);
            color: var(--correct);
        }

        .status-review {
            background-color: rgba(196, 69, 54, 0.3);
            color: var(--incorrect);
        }

        .return-hub-button {
            background-color: var(--accent-gold);
            color: var(--bg-main);
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .return-hub-button:hover {
            background-color: #d9b860;
            transform: scale(1.02);
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 15px;
        }

        /* ===== DASHBOARD LINK ===== */
        .dashboard-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .dashboard-link a {
            display: inline-block;
            background-color: var(--card-bg);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .dashboard-link a:hover {
            background-color: rgba(201, 168, 76, 0.1);
            transform: translateY(-2px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .header-title {
                font-size: 1.8rem;
            }

            .header-icon {
                font-size: 2rem;
            }

            .question-container {
                padding: 15px;
            }

            .results-score {
                font-size: 2.2rem;
            }

            .day-card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="header-icon">⚔️</div>
            <h1 class="header-title">The Forge — Easter Boot Camp</h1>
            <p class="header-subtitle">5 days. 7 weaknesses. One mission: LEAP Advanced.</p>
            <div class="countdown" id="countdown"></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="overallProgress"></div>
            </div>
            <div class="progress-text" id="progressText">Day 0 of 5 complete</div>
        </header>

        <!-- HUB VIEW -->
        <div class="hub-view" id="hubView">
            <div id="dayCardsContainer"></div>
            <div class="dashboard-link">
                <a href="Jacob_Dashboard.html">← Return to Dashboard</a>
            </div>
        </div>

        <!-- DAY VIEWS -->
        <div class="day-view" id="dayView">
            <button class="back-button" onclick="app.returnToHub()">← Back to Hub</button>

            <div class="day-header">
                <h1 id="dayTitle"></h1>
                <div class="phase-indicator" id="phaseIndicator">LEARN</div>
            </div>

            <!-- LEARN PHASE -->
            <div class="learn-phase" id="learnPhase">
                <div id="khanLinksContainer"></div>
                <div class="quiz-readiness" id="quizReadiness"></div>
                <button class="start-quiz-button" id="startQuizButton" onclick="app.startQuiz()" disabled>Start Quiz</button>
            </div>

            <!-- QUIZ PHASE -->
            <div class="quiz-phase" id="quizPhase">
                <div class="quiz-progress">
                    <div class="quiz-progress-text" id="quizProgressText">Question 1 of 12</div>
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" id="quizProgressFill"></div>
                    </div>
                </div>

                <div class="question-container">
                    <div class="standard-tag" id="standardTag"></div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="feedback" id="feedback">
                        <div class="feedback-title" id="feedbackTitle"></div>
                        <div class="feedback-explanation" id="feedbackExplanation"></div>
                    </div>
                    <button class="next-button" id="nextButton" onclick="app.nextQuestion()">Next Question</button>
                </div>
            </div>

            <!-- RESULTS VIEW -->
            <div class="results-view" id="resultsView">
                <div class="results-container">
                    <div class="results-score" id="resultScore"></div>
                    <div class="results-percentage" id="resultPercentage"></div>
                    <div class="results-message" id="resultMessage"></div>
                    <div class="time-display" id="timeDisplay"></div>
                    <div class="results-breakdown" id="resultsBreakdown"></div>
                    <button class="return-hub-button" onclick="app.returnToHub()">← Back to Hub</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== APPLICATION STATE & CONFIG =====
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6BhujnfDQt9oguJFSemP-5iBhyUkWr9e8m2iDgs3MkRsB2AKm5tvoc53gajmd6DCVjQ/exec';
        const STORAGE_KEY = 'jacob_bootcamp_progress';
        const TODAY = new Date();
        const LEAP_DATE = new Date(2026, 4, 2); // May 2, 2026

        // Calculate days until LEAP
        function daysUntilLEAP() {
            const timeDiff = LEAP_DATE - TODAY;
            return Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
        }

        // ===== DAY DATA STRUCTURE =====
        const dayData = [
            {
                dayNum: 1,
                title: "Ratios & Proportions",
                icon: "📊",
                topic: "Math",
                khanLinks: [
                    {type: "VIDEO", title: "Intro to ratios", url: "https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-intro-ratios/v/intro-to-ratios", desc: "Learn what ratios are and how to express them", time: "~4 min"},
                    {type: "VIDEO", title: "Part:whole ratios", url: "https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-intro-ratios/v/ratios-as-fractions", desc: "The difference between part-to-part and part-to-whole ratios", time: "~5 min"},
                    {type: "VIDEO", title: "Equivalent ratios", url: "https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-intro-ratios/v/equivalent-ratios", desc: "How to find equivalent ratios by multiplying/dividing", time: "~5 min"},
                    {type: "EXERCISE", title: "Basic ratios", url: "https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-intro-ratios/e/basic-ratios", desc: "Practice representing ratios", time: "~10 min"},
                    {type: "EXERCISE", title: "Equivalent ratios", url: "https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-intro-ratios/e/equivalent_ratios", desc: "Practice finding equivalent ratios", time: "~10 min"},
                    {type: "EXERCISE", title: "Ratio tables", url: "https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-ratio-tables/e/ratio-tables", desc: "Fill out ratio tables", time: "~10 min"}
                ],
                quizQuestions: [
                    {std:"6.RP.1", text:"A bag has 6 red marbles and 10 blue marbles. What is the ratio of red marbles to TOTAL marbles?", opts:["6:10","6:16","3:5","3:8"], cor:3, exp:"Total = 6 + 10 = 16. Red to total = 6:16 = 3:8. Common mistake: writing part-to-part (6:10) instead of part-to-whole (6:16)."},
                    {std:"6.RP.1", text:"A class has 12 boys and 18 girls. What is the ratio of boys to girls in simplest form?", opts:["12:18","2:3","3:2","2:5"], cor:1, exp:"12:18 → divide both by 6 → 2:3. Not 2:5 (that would be boys to total)."},
                    {std:"6.RP.1", text:"A basket has 8 apples and 12 oranges. Which ratio represents oranges to TOTAL fruit?", opts:["8:12","12:8","12:20","8:20"], cor:2, exp:"Total fruit = 8+12 = 20. Oranges to total = 12:20. Simplifies to 3:5."},
                    {std:"6.RP.1", text:"There are 15 cats and 25 dogs at a shelter. What fraction of the animals are cats?", opts:["15/25","3/5","15/40","25/40"], cor:2, exp:"Total = 15+25 = 40. Cats = 15/40 = 3/8. This is a part-to-whole ratio expressed as a fraction."},
                    {std:"6.RP.3", text:"If 3 tickets cost $21, how much do 7 tickets cost?", opts:["$42","$49","$63","$35"], cor:1, exp:"Unit rate: $21 ÷ 3 = $7 per ticket. Then 7 × $7 = $49."},
                    {std:"6.RP.3", text:"A recipe uses 2 cups of flour for 12 cookies. How much flour for 30 cookies?", opts:["3 cups","4 cups","5 cups","6 cups"], cor:2, exp:"Set up proportion: 2/12 = x/30. Cross multiply: 12x = 60, x = 5. OR: 30 is 2.5 times 12, so 2 × 2.5 = 5 cups."},
                    {std:"6.RP.3", text:"A car uses 4 gallons of gas to drive 120 miles. Which proportion correctly finds how many gallons (x) are needed for 300 miles?", opts:["4/120 = 300/x","4/120 = x/300","120/4 = x/300","Both B and C are correct"], cor:3, exp:"Both B (gallons/miles = gallons/miles) and C (miles/gallons = miles/gallons) are valid. Proportions can be set up different ways as long as the relationship is consistent."},

                quizQuestions: [
                    {std:"6-LS-3", text:"What does HOMOZYGOUS mean?", opts:["Having two different alleles (like Tt)","Having two of the same allele (like TT or tt)","Having no alleles for a trait","Having alleles from only one parent"], cor:1, exp:"Homo = same. Homozygous = two identical alleles. TT (homozygous dominant) or tt (homozygous recessive). Hetero = different → Tt."},
                    {std:"6-LS-3", text:"What does HETEROZYGOUS mean?", opts:["Having two of the same allele","Having two DIFFERENT alleles (one dominant, one recessive)","Having only dominant alleles","Missing an allele"], cor:1, exp:"Hetero = different. Heterozygous (Tt) means one dominant allele (T) and one recessive allele (t). The organism LOOKS dominant but CARRIES the recessive trait."},
                    {std:"6-LS-3", text:"Two tall pea plants (both Tt) are crossed. Can they produce short (tt) offspring?", opts:["No — both parents are tall, so all offspring must be tall","Yes — each parent can pass on a recessive 't' allele","Only if one parent is short","Only if both parents are TT"], cor:1, exp:"YES! Each Tt parent has a 't' to give. If both pass their 't', the offspring is tt (short). This happens 1 out of 4 times."},
                    {std:"6-LS-3", text:"Cross: Tt × Tt. Complete the Punnett square. What fraction of offspring will be SHORT (tt)?", opts:["1/2","1/3","1/4","0 — none will be short"], cor:2, exp:"Punnett square: TT, Tt, Tt, tt. Only 1 out of 4 boxes is tt. So 1/4 (25%) will be short."},
                    {std:"6-LS-3", text:"Cross: Tt × Tt. What fraction of offspring will LOOK tall (have at least one T)?", opts:["1/4","1/2","3/4","All of them"], cor:2, exp:"TT, Tt, Tt, tt → 3 out of 4 have at least one T → 3/4 look tall. Only tt (1/4) looks short."},

                    {std:"6-LS-3", text:"Two brown-eyed parents have a blue-eyed child. Brown (B) is dominant over blue (b). What are the parents' genotypes?", opts:["Both BB","Both Bb","One BB, one Bb","One BB, one bb"], cor:1, exp:"For a bb child, EACH parent must contribute a 'b'. Since both parents have brown eyes (dominant phenotype) but carry 'b', they must both be Bb."},
                    {std:"6-LS-3", text:"What is the difference between GENOTYPE and PHENOTYPE?", opts:["Genotype = what you look like, Phenotype = your DNA","Genotype = your allele combination (like Tt), Phenotype = your observable trait (like tall)","They mean the same thing","Genotype is for plants, Phenotype is for animals"], cor:1, exp:"Genotype = genetic makeup (TT, Tt, or tt). Phenotype = physical appearance (tall or short). A Tt and TT plant have different genotypes but the SAME phenotype (tall)."},
                    {std:"6-LS-3", text:"Cross: Tt × tt. What fraction of offspring will be short (tt)?", opts:["0","1/4","1/2","All of them"], cor:2, exp:"Punnett square: Tt, Tt, tt, tt. Half (2/4 = 1/2) are tt (short), half are Tt (tall)."},

                    {std:"6-LS-3", text:"In humans, free earlobes (E) are dominant over attached earlobes (e). A man with free earlobes (Ee) marries a woman with attached earlobes (ee). What percentage of their children could have attached earlobes?", opts:["0%","25%","50%","100%"], cor:2, exp:"Ee × ee → Ee, Ee, ee, ee. Half are ee (attached). So 50%."},

                    {std:"6-PS-1", text:"A metal spoon sitting in a pot of hot soup becomes hot. What type of heat transfer is this?", opts:["Radiation","Convection","Conduction","Insulation"], cor:2, exp:"CONDUCTION = heat transfer through DIRECT CONTACT. The hot soup touches the spoon, transferring heat molecule to molecule. No gap between them."},
                    {std:"6-PS-1", text:"You feel warmth from a campfire even though you're not touching it. What type of heat transfer?", opts:["Conduction","Convection","Radiation","Evaporation"], cor:2, exp:"RADIATION = heat transfer through electromagnetic waves. No contact or fluid movement needed. Works even through empty space (that's how the Sun heats Earth)."},
                    {std:"6-PS-1", text:"Hot air rises from a heater, circulates around a room, then sinks as it cools. This is:", opts:["Conduction","Convection","Radiation","Condensation"], cor:1, exp:"CONVECTION = heat transfer through the MOVEMENT of fluids (liquids or gases). Hot air rises, cool air sinks, creating a circulation pattern called a convection current."},
                    {std:"6-PS-1", text:"Which is the BEST summary of all three heat transfer methods?", opts:["Conduction = through fluids, Convection = through contact, Radiation = through waves","Conduction = through direct contact, Convection = through fluid movement, Radiation = through electromagnetic waves","Conduction = through waves, Convection = through contact, Radiation = through fluids","They all work the same way"], cor:1, exp:"Contact = conduction. Fluid movement = convection. Waves (no medium needed) = radiation. The key distinction is HOW the energy moves."},
                    {std:"6-PS-1", text:"Walking barefoot on hot sand burns your feet. This is an example of:", opts:["Radiation","Convection","Conduction","Insulation"], cor:2, exp:"Your feet are in DIRECT CONTACT with the hot sand. Heat transfers from sand to skin through conduction."},
                    {std:"6-PS-1", text:"Boiling water in a pot: the water at the bottom heats up, rises to the top, and cooler water sinks to replace it. This circulation is:", opts:["Conduction","Convection","Radiation","Sublimation"], cor:1, exp:"This is a convection current in a liquid. The hot water rises (less dense), cool water sinks (more dense), creating continuous circulation."},
                    {std:"6-ESS-3", text:"A warm, moist air mass moves toward a stationary cold air mass. What happens?", opts:["They mix evenly into mild weather","The warm air rises OVER the cold air, cools, and forms clouds/precipitation","The cold air floats above the warm air","Both air masses disappear"], cor:1, exp:"Warm air is less dense than cold air. At a WARM FRONT, warm air slides UP and OVER the cold air. As it rises, it cools, moisture condenses, forming clouds and rain."},

        // ===== APPLICATION OBJECT =====
        const app = {
            currentDay: null,
            currentQuestionIndex: 0,
            quizStartTime: null,
            quizAnswers: [],
            progress: {},

            init() {
                this.loadProgress();
                this.updateCountdown();
                this.renderHub();
            },

            loadProgress() {
                const saved = localStorage.getItem(STORAGE_KEY);
                this.progress = saved ? JSON.parse(saved) : {};

                // Initialize days if needed
                dayData.forEach(day => {
                    if (!this.progress[`day${day.dayNum}`]) {
                        this.progress[`day${day.dayNum}`] = {
                            completed: false,
                            score: null,
                            checkedLinks: {},
                            timestamp: null
                        };
                    }
                });
                this.saveProgress();
            },

            saveProgress() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(this.progress));
            },

            updateCountdown() {
                const days = daysUntilLEAP();
                const countdownEl = document.getElementById('countdown');
                countdownEl.textContent = `${days} days until LEAP (May 2, 2026)`;
            },

            renderHub() {
                document.getElementById('hubView').classList.add('active');
                document.getElementById('dayView').classList.remove('active');

                const container = document.getElementById('dayCardsContainer');
                container.innerHTML = '';

                let completed = 0;
                dayData.forEach((day, idx) => {
                    const dayKey = `day${day.dayNum}`;
                    const dayProgress = this.progress[dayKey];
                    if (dayProgress.completed) completed++;

                    const isLocked = idx > 0 && !this.progress[`day${day.dayNum - 1}`].completed;
                    const statusClass = dayProgress.completed ? 'status-completed' : (isLocked ? 'status-locked' : 'status-available');
                    const statusText = dayProgress.completed ? `✓ Completed (${dayProgress.score}%)` : (isLocked ? 'Locked' : 'Ready');

                    const card = document.createElement('div');
                    card.className = `day-card ${isLocked ? 'locked' : ''}`;
                    card.innerHTML = `
                        <div class="day-card-header">
                            <div class="day-card-title">Day ${day.dayNum}: ${day.icon} ${day.title}</div>
                            <div class="day-card-status ${statusClass}">${statusText}</div>
                        </div>
                        <div class="day-card-details">
                            <strong>${day.topic}</strong><br>
                            ${day.khanLinks.length} videos + exercises<br>
                            12 quiz questions
                            ${isLocked ? `<br><span class="unlock-link" onclick="app.unlockDay(${day.dayNum})">Force Unlock</span>` : ''}
                        </div>
                    `;

                    if (!isLocked) {
                        card.onclick = () => this.selectDay(day.dayNum);
                    }

                    container.appendChild(card);
                });

                // Update progress bar
                const progress = (completed / dayData.length) * 100;
                document.getElementById('overallProgress').style.width = progress + '%';
                document.getElementById('progressText').textContent = `Day ${completed} of 5 complete`;
            },

            selectDay(dayNum) {
                this.currentDay = dayData[dayNum - 1];
                this.currentQuestionIndex = 0;
                this.quizAnswers = [];
                this.quizStartTime = null;

                document.getElementById('hubView').classList.remove('active');
                document.getElementById('dayView').classList.add('active');

                this.renderDayView();
            },

            renderDayView() {
                const day = this.currentDay;
                document.getElementById('dayTitle').textContent = `Day ${day.dayNum}: ${day.title}`;
                document.getElementById('phaseIndicator').textContent = 'LEARN';

                // Hide all phases
                document.getElementById('learnPhase').classList.remove('active');
                document.getElementById('quizPhase').classList.remove('active');
                document.getElementById('resultsView').classList.remove('active');

                const dayKey = `day${day.dayNum}`;
                const dayProgress = this.progress[dayKey];

                if (dayProgress.completed) {
                    this.showResults();
                } else {
                    this.renderLearnPhase();
                }
            },

            renderLearnPhase() {
                const day = this.currentDay;
                const dayKey = `day${day.dayNum}`;
                const dayProgress = this.progress[dayKey];

                const container = document.getElementById('khanLinksContainer');
                container.innerHTML = '';

                day.khanLinks.forEach((link, idx) => {
                    const isChecked = dayProgress.checkedLinks[idx] || false;
                    const card = document.createElement('a');
                    card.href = link.url;
                    card.target = '_blank';
                    card.className = `khan-link ${isChecked ? 'checked' : ''}`;

                    card.innerHTML = `
                        <div class="khan-link-header">
                            <input type="checkbox" class="khan-checkbox" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation(); app.toggleKhanCheckbox(${idx})">
                            <div class="khan-content">
                                <div class="khan-type">${link.type}</div>
                                <div class="khan-title">${link.title}</div>
                                <div class="khan-description">${link.desc}</div>
                                <div class="khan-time">${link.time}</div>
                            </div>
                        </div>
                    `;

                    container.appendChild(card);
                });

                this.updateQuizReadiness();
                document.getElementById('learnPhase').classList.add('active');
            },

            toggleKhanCheckbox(idx) {
                const dayKey = `day${this.currentDay.dayNum}`;
                if (!this.progress[dayKey].checkedLinks[idx]) {
                    this.progress[dayKey].checkedLinks[idx] = true;
                } else {
                    this.progress[dayKey].checkedLinks[idx] = false;
                }
                this.saveProgress();
                this.renderLearnPhase();
            },

            updateQuizReadiness() {
                const day = this.currentDay;
                const dayKey = `day${day.dayNum}`;
                const dayProgress = this.progress[dayKey];

                const checkedCount = Object.values(dayProgress.checkedLinks).filter(v => v).length;
                const totalCount = day.khanLinks.length;
                const required = Math.ceil(totalCount / 2);
                const canStart = checkedCount >= required;

                const readinessEl = document.getElementById('quizReadiness');
                readinessEl.innerHTML = `
                    <span class="checked-count">${checkedCount}</span> of ${totalCount} lessons completed.<br>
                    ${required} needed to start quiz. ${canStart ? '<strong>Ready!</strong>' : `${required - checkedCount} more to go.`}
                `;

                const startBtn = document.getElementById('startQuizButton');
                startBtn.disabled = !canStart;
            },

            startQuiz() {
                this.currentQuestionIndex = 0;
                this.quizAnswers = [];
                this.quizStartTime = Date.now();

                document.getElementById('learnPhase').classList.remove('active');
                document.getElementById('quizPhase').classList.add('active');
                document.getElementById('phaseIndicator').textContent = 'QUIZ';

                this.renderQuestion();
            },

            renderQuestion() {
                const day = this.currentDay;
                const q = day.quizQuestions[this.currentQuestionIndex];

                document.getElementById('standardTag').textContent = q.std;
                document.getElementById('questionText').textContent = q.text;

                // Update progress
                const totalQuestions = day.quizQuestions.length;
                const progress = ((this.currentQuestionIndex + 1) / totalQuestions) * 100;
                document.getElementById('quizProgressText').textContent = `Question ${this.currentQuestionIndex + 1} of ${totalQuestions}`;
                document.getElementById('quizProgressFill').style.width = progress + '%';

                // Render options
                const optionsContainer = document.getElementById('optionsContainer');
                optionsContainer.innerHTML = '';

                q.opts.forEach((opt, idx) => {
                    const option = document.createElement('div');
                    option.className = 'option';
                    option.textContent = opt;
                    option.onclick = () => this.selectOption(idx, q);
                    optionsContainer.appendChild(option);
                });

                // Hide feedback and next button initially
                document.getElementById('feedback').classList.remove('show', 'feedback-correct', 'feedback-incorrect');
                document.getElementById('nextButton').classList.remove('show');
            },

            selectOption(selectedIdx, question) {
                const optionsContainer = document.getElementById('optionsContainer');
                const options = optionsContainer.querySelectorAll('.option');

                // Check if already answered
                if (this.quizAnswers[this.currentQuestionIndex] !== undefined) {
                    return;
                }

                // Mark as answered
                this.quizAnswers[this.currentQuestionIndex] = selectedIdx;

                // Show feedback
                const isCorrect = selectedIdx === question.cor;
                const feedbackEl = document.getElementById('feedback');
                const feedbackTitle = document.getElementById('feedbackTitle');
                const feedbackExplanation = document.getElementById('feedbackExplanation');

                feedbackTitle.textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect';
                feedbackExplanation.textContent = question.exp;

                if (isCorrect) {
                    feedbackEl.classList.add('feedback-correct');
                    feedbackEl.classList.remove('feedback-incorrect');
                    options[selectedIdx].classList.add('correct');
                } else {
                    feedbackEl.classList.add('feedback-incorrect');
                    feedbackEl.classList.remove('feedback-correct');
                    options[selectedIdx].classList.add('incorrect');
                    options[question.cor].classList.add('correct');
                }

                feedbackEl.classList.add('show');

                // Mark all options as answered
                options.forEach(opt => opt.classList.add('answered'));

                // Show next button
                const nextBtn = document.getElementById('nextButton');
                if (this.currentQuestionIndex < this.currentDay.quizQuestions.length - 1) {
                    nextBtn.textContent = 'Next Question';
                } else {
                    nextBtn.textContent = 'See Results';
                }
                nextBtn.classList.add('show');
            },

            nextQuestion() {
                if (this.currentQuestionIndex < this.currentDay.quizQuestions.length - 1) {
                    this.currentQuestionIndex++;
                    this.renderQuestion();
                } else {
                    this.finishQuiz();
                }
            },

            finishQuiz() {
                const day = this.currentDay;
                const answersSnapshot = [...this.quizAnswers]; // preserve actual answers
                const correct = answersSnapshot.filter((ans, idx) => ans === day.quizQuestions[idx].cor).length;
                const total = day.quizQuestions.length;
                const percentage = Math.round((correct / total) * 100);
                const durationMs = Date.now() - this.quizStartTime;
                const durationMins = Math.round(durationMs / 60000);

                const dayKey = `day${day.dayNum}`;
                this.progress[dayKey].completed = true;
                this.progress[dayKey].score = percentage;
                this.progress[dayKey].correct = correct;
                this.progress[dayKey].total = total;
                this.progress[dayKey].durationMins = durationMins;
                this.progress[dayKey].answers = answersSnapshot;
                this.progress[dayKey].timestamp = new Date().toISOString();
                this.saveProgress();

                // Send to Apps Script
                this.sendResultsToAppScript(day.dayNum, percentage, correct, total, durationMins);

                // Set bonus signal
                localStorage.setItem('jacob_bonus_signal', JSON.stringify({
                    bootcamp: true,
                    day: day.dayNum,
                    score: percentage,
                    timestamp: new Date().toISOString()
                }));

                document.getElementById('quizPhase').classList.remove('active');
                this.showResults();
            },

            sendResultsToAppScript(dayNum, percentage, correct, total, durationMins) {
                const localDate = (function(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();

                // Save bootcamp results to dedicated BootcampResults sheet
                // Uses saveBootcampResults action so it does NOT overwrite DailyTracking
                const bootcampPayload = {
                    action: 'saveBootcampResults',
                    date: localDate,
                    student: 'Jacob',
                    bootcampDay: dayNum,
                    dayTitle: this.currentDay.title,
                    subject: this.currentDay.subject,
                    score: percentage,
                    correct: correct,
                    total: total,
                    durationMins: durationMins,
                    timestamp: new Date().toISOString()
                };

                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(bootcampPayload)
                }).catch(err => console.log('Bootcamp save call made (no-cors)', err));

                // Also mark today's DailyTracking bootcamp flag WITHOUT overwriting session data
                // Uses a MERGE approach: only sets bootcamp fields, preserves existing session/practice/reading
                const trackingPayload = {
                    action: 'mergeDailyTrackingBootcamp',
                    date: localDate,
                    student: 'Jacob',
                    bootcampCompleted: true,
                    bootcampDay: dayNum,
                    bootcampScore: percentage
                };

                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(trackingPayload)
                }).catch(err => console.log('Tracking merge call made (no-cors)', err));
            },

            showResults() {
                const day = this.currentDay;
                const dayKey = `day${day.dayNum}`;
                const dayProgress = this.progress[dayKey];

                if (!dayProgress.completed) return;

                const correct = dayProgress.correct || 0;
                const total = dayProgress.total || day.quizQuestions.length;
                const percentage = dayProgress.score;
                const durationMins = dayProgress.durationMins || 0;
                const savedAnswers = dayProgress.answers || [];

                document.getElementById('resultScore').textContent = `${correct}/${total}`;
                document.getElementById('resultPercentage').textContent = `${percentage}%`;

                let message = '';
                if (percentage >= 90) {
                    message = 'Outstanding! You crushed it, Jacob! This topic is LOCKED DOWN.';
                } else if (percentage >= 80) {
                    message = 'Excellent work! You\'re well on your way to Advanced.';
                } else if (percentage >= 70) {
                    message = 'Good job! Review the ones you missed, then keep moving.';
                } else {
                    message = 'Go back to the Khan lessons, then retake this quiz. You got this.';
                }
                document.getElementById('resultMessage').textContent = message;

                if (durationMins > 0) {
                    document.getElementById('timeDisplay').textContent = `Completed in ${durationMins} minutes`;
                }

                // Breakdown by standard using saved answers
                const standardsMap = {};
                day.quizQuestions.forEach((q, idx) => {
                    if (!standardsMap[q.std]) {
                        standardsMap[q.std] = { total: 0, correct: 0 };
                    }
                    standardsMap[q.std].total++;
                    if (savedAnswers[idx] === q.cor) {
                        standardsMap[q.std].correct++;
                    }
                });

                const breakdownEl = document.getElementById('resultsBreakdown');
                breakdownEl.innerHTML = '<strong>Standards Breakdown:</strong>';
                Object.entries(standardsMap).forEach(([std, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const mastered = data.correct === data.total;
                    const status = mastered ? `✓ Mastered (${data.correct}/${data.total})` : `✗ Needs Review (${data.correct}/${data.total})`;
                    const statusClass = mastered ? 'status-mastered' : 'status-review';
                    const div = document.createElement('div');
                    div.className = 'breakdown-item';
                    div.innerHTML = `
                        <div class="breakdown-label">${std}</div>
                        <div class="breakdown-status ${statusClass}">${status}</div>
                    `;
                    breakdownEl.appendChild(div);
                });

                document.getElementById('resultsView').classList.add('active');
            },

            returnToHub() {
                document.getElementById('hubView').classList.add('active');
                document.getElementById('dayView').classList.remove('active');
                this.renderHub();
            },

            unlockDay(dayNum) {
                if (dayNum > 1) {
                    const prevDayKey = `day${dayNum - 1}`;
                    this.progress[prevDayKey].completed = true;
                    this.progress[prevDayKey].score = 70;
                    this.saveProgress();
                    this.renderHub();
                }
            }
        };

        // Initialize app on page load
        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
