<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase — Finish Your Expedition Assessment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1208;
            color: #e8e0d0;
            font-family: Georgia, Palatino, serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background-color: #1e2416;
            border: 2px solid #3a4a2e;
            border-radius: 8px;
        }

        h1 {
            font-size: 2.5em;
            color: #2eaaaa;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.2em;
            color: #d4a843;
            font-weight: normal;
        }

        .questions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 40px;
        }

        .question-card {
            background-color: #1e2416;
            border: 2px solid #3a4a2e;
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .question-card:hover {
            border-color: #2eaaaa;
            box-shadow: 0 0 15px rgba(46, 170, 170, 0.2);
        }

        .question-number {
            color: #d4a843;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .question-text {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #e8e0d0;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-button {
            padding: 12px 16px;
            background-color: #2a3220;
            border: 2px solid #3a4a2e;
            border-radius: 6px;
            color: #e8e0d0;
            cursor: pointer;
            font-family: Georgia, Palatino, serif;
            font-size: 1em;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-button:hover {
            background-color: #353f2b;
            border-color: #2eaaaa;
        }

        .option-button.selected {
            background-color: #2eaaaa;
            border-color: #2eaaaa;
            color: #1a1208;
            font-weight: bold;
        }

        .submit-section {
            text-align: center;
            padding: 30px 20px;
            background-color: #1e2416;
            border: 2px solid #3a4a2e;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .submit-button {
            padding: 15px 40px;
            background-color: #2eaaaa;
            border: none;
            border-radius: 6px;
            color: #1a1208;
            font-family: Georgia, Palatino, serif;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .submit-button:hover {
            background-color: #1f8888;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 170, 170, 0.3);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .completion-message {
            display: none;
            background-color: #1e2416;
            border: 2px solid #d4a843;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }

        .completion-message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .completion-message h2 {
            color: #d4a843;
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .completion-message p {
            color: #e8e0d0;
            margin-bottom: 25px;
            font-size: 1.05em;
        }

        .next-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .next-button {
            padding: 12px 20px;
            background-color: #d4a843;
            border: none;
            border-radius: 6px;
            color: #1a1208;
            font-family: Georgia, Palatino, serif;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .next-button:hover {
            background-color: #c99330;
            transform: translateY(-2px);
        }

        .questions-section {
            display: block;
        }

        .questions-section.hidden {
            display: none;
        }

        .error-message {
            display: none;
            background-color: #8b4545;
            border: 2px solid #d4a843;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #e8e0d0;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 1em;
            }

            .question-card {
                padding: 18px;
            }

            .question-text {
                font-size: 1em;
            }

            .option-button {
                padding: 10px 12px;
                font-size: 0.95em;
            }

            .submit-button,
            .next-button {
                width: 100%;
            }

            .next-buttons {
                flex-direction: column;
            }

            header {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Chase — Finish Your Expedition</h1>
            <p class="subtitle">Section 5: Verbal Reasoning — 10 Questions</p>
        </header>

        <div class="error-message" id="errorMessage"></div>

        <div class="questions-section" id="questionsSection">
            <div class="questions-wrapper" id="questionsWrapper"></div>

            <div class="submit-section">
                <button class="submit-button" onclick="submitAnswers()">Submit Final Answers</button>
            </div>
        </div>

        <div class="completion-message" id="completionMessage">
            <h2>🎉 Great work, Chase!</h2>
            <p>All 50 questions complete. Your full results have been saved.</p>
            <div class="next-buttons">
                <button class="next-button" onclick="window.location.href='Diagnostic_Review_Chase.html'">
                    Review Answers with Doug →
                </button>
                <button class="next-button" onclick="window.location.href='Chase_Dashboard.html'">
                    Return to Explorer's Log
                </button>
            </div>
        </div>
    </div>

    <script>
        // Question data for Section 5: Verbal Reasoning
        const questions = [
            {
                id: 1,
                text: "What is a synonym for 'happy'?",
                options: ["sad", "joyful", "angry", "confused"],
                correct: 1
            },
            {
                id: 2,
                text: "What is an antonym for 'big'?",
                options: ["large", "huge", "small", "tall"],
                correct: 2
            },
            {
                id: 3,
                text: "Cat is to kitten as dog is to...",
                options: ["puppy", "pet", "bark", "wolf"],
                correct: 0
            },
            {
                id: 4,
                text: "Which word does NOT belong?",
                options: ["Apple", "Banana", "Carrot", "Orange"],
                correct: 2
            },
            {
                id: 5,
                text: "If all cats are animals and Fluffy is a cat, then Fluffy must be...",
                options: ["a bird", "an animal", "white", "fast"],
                correct: 1
            },
            {
                id: 6,
                text: "What is a synonym for 'beautiful'?",
                options: ["ugly", "pretty", "noisy", "slow"],
                correct: 1
            },
            {
                id: 7,
                text: "Hat is to head as shoe is to...",
                options: ["sock", "foot", "hand", "leg"],
                correct: 1
            },
            {
                id: 8,
                text: "Which group contains only items you would wear?",
                options: [
                    "Shoes, hat, spoon, gloves",
                    "Pants, shirt, socks, jacket",
                    "Chair, desk, pencil, book",
                    "Plate, cup, fork, napkin"
                ],
                correct: 1
            },
            {
                id: 9,
                text: "What is an antonym for 'fast'?",
                options: ["quick", "rapid", "slow", "speedy"],
                correct: 2
            },
            {
                id: 10,
                text: "Square is to four-sided as triangle is to...",
                options: ["circle", "three-sided", "rectangular", "pointed"],
                correct: 1
            }
        ];

        // Store for selected answers
        const selectedAnswers = {};

        // Initialize the page
        function initPage() {
            renderQuestions();
        }

        // Render all questions
        function renderQuestions() {
            const wrapper = document.getElementById('questionsWrapper');
            wrapper.innerHTML = '';

            questions.forEach((question, index) => {
                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';

                let questionContent = `
                    <div class="question-number">Question ${index + 1} of 10</div>
                    <div class="question-text">${question.text}</div>
                    <div class="options-container">
                `;

                question.options.forEach((option, optionIndex) => {
                    const isSelected = selectedAnswers[question.id] === optionIndex;
                    questionContent += `
                        <button class="option-button ${isSelected ? 'selected' : ''}"
                                onclick="selectAnswer(${question.id}, ${optionIndex})">
                            ${option}
                        </button>
                    `;
                });

                questionContent += `</div>`;
                questionCard.innerHTML = questionContent;
                wrapper.appendChild(questionCard);
            });
        }

        // Handle answer selection
        function selectAnswer(questionId, optionIndex) {
            selectedAnswers[questionId] = optionIndex;
            renderQuestions();
        }

        // Submit answers
        async function submitAnswers() {
            // Check if all questions are answered
            if (Object.keys(selectedAnswers).length < questions.length) {
                showError('Please answer all 10 questions before submitting.');
                return;
            }

            try {
                // Load existing answers from localStorage
                const existingResultsKey = 'diagnosticResults_targeted_diagnostic_20260306';
                let mergedResults = {};

                const existingResults = localStorage.getItem(existingResultsKey);
                if (existingResults) {
                    try {
                        mergedResults = JSON.parse(existingResults);
                    } catch (e) {
                        console.warn('Could not parse existing results, starting fresh');
                    }
                }

                // Add Section 5 answers to merged results
                mergedResults.section5 = selectedAnswers;
                mergedResults.student = 'Chase';
                mergedResults.grade = 5;
                mergedResults.testId = 'targeted_diagnostic_20260306';
                mergedResults.timestamp = new Date().toISOString();

                // Save merged results to localStorage
                localStorage.setItem(existingResultsKey, JSON.stringify(mergedResults));

                // Try to POST to Apps Script
                try {
                    const response = await fetch('https://script.google.com/macros/s/AKfycby6BhujnfDQt9oguJFSemP-5iBhyUkWr9e8m2iDgs3MkRsB2AKm5tvoc53gajmd6DCVjQ/exec', {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(mergedResults)
                    });
                } catch (fetchError) {
                    console.warn('Could not reach Apps Script, but results saved locally:', fetchError);
                }

                // Write completion signal
                const signal = {
                    completed: true,
                    points: 15,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('chase_diagnostic_signal', JSON.stringify(signal));

                // Show completion message
                document.getElementById('questionsSection').classList.add('hidden');
                document.getElementById('completionMessage').classList.add('show');

            } catch (error) {
                console.error('Error submitting answers:', error);
                showError('An error occurred while saving your answers. Please try again.');
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Initialize page on load
        window.addEventListener('load', initPage);
    </script>
</body>
</html>
