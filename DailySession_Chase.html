<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Session — Mission Briefing</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            background-color: #0a0e13; color: #c8d8e8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px; line-height: 1.6; overflow-x: hidden;
        }
        .container { max-width: 650px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 15px; }
        .back-button { background: none; border: none; color: #00ff41; font-size: 24px; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease, color 0.2s ease; border-radius: 8px; }
        .back-button:hover { transform: scale(1.1); color: #c8d8e8; }
        .timer-display { font-size: 14px; color: #5a6a7a; font-variant-numeric: tabular-nums; }
        .timer-display .elapsed { color: #00ff41; font-weight: 700; }

        .phase-bar { display: flex; gap: 4px; margin-bottom: 24px; }
        .phase-segment { flex: 1; height: 6px; border-radius: 3px; background-color: #1e2d3d; transition: background-color 0.3s ease; }
        .phase-segment.active { background-color: #00ff41; }
        .phase-segment.completed { background-color: #00cc33; }
        .phase-label-bar { display: flex; gap: 4px; margin-bottom: 16px; }
        .phase-label { flex: 1; text-align: center; font-size: 10px; color: #3a4a5a; text-transform: uppercase; letter-spacing: 0.5px; }
        .phase-label.active { color: #00ff41; font-weight: 700; }
        .phase-label.completed { color: #00cc33; }

        .screen { display: none; animation: fadeIn 0.4s ease; flex: 1; flex-direction: column; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 30px; }
        .loading-spinner { width: 60px; height: 60px; border: 3px solid #1e2d3d; border-top: 3px solid #00ff41; border-radius: 50%; animation: spin 1.5s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 18px; color: #00ff41; text-align: center; }

        .subject-header { text-align: center; margin-bottom: 24px; }
        .subject-header h2 { font-size: 22px; color: #00ff41; font-weight: 400; margin-bottom: 6px; }
        .subject-header .subject-meta { font-size: 13px; color: #5a6a7a; }
        .subject-icon { font-size: 32px; margin-bottom: 8px; }

        .reading-container { flex: 1; display: flex; flex-direction: column; }
        .reading-title { font-size: 20px; color: #00ff41; margin-bottom: 12px; font-weight: 400; }
        .reading-meta { display: flex; gap: 20px; font-size: 13px; color: #5a6a7a; margin-bottom: 16px; }
        .reading-content { background-color: #111820; border: 2px solid #1e2d3d; border-radius: 12px; padding: 24px; line-height: 1.8; margin-bottom: 20px; flex: 1; overflow-y: auto; max-height: 450px; }
        .reading-content p { margin-bottom: 16px; text-align: justify; }
        .reading-content p:last-child { margin-bottom: 0; }

        .passage-review-toggle { display: flex; align-items: center; gap: 8px; background-color: #111820; border: 1px solid #1e2d3d; border-radius: 8px; padding: 10px 16px; cursor: pointer; color: #5a6a7a; font-size: 14px; margin-bottom: 16px; transition: all 0.2s ease; }
        .passage-review-toggle:hover { background-color: #152028; border-color: #2a3a4a; }
        .passage-review-toggle .toggle-arrow { transition: transform 0.2s ease; font-size: 12px; }
        .passage-review-toggle.open .toggle-arrow { transform: rotate(90deg); }
        .passage-review-panel { display: none; background-color: #0d1318; border: 1px solid #1e2d3d; border-radius: 8px; padding: 20px; margin-bottom: 16px; max-height: 250px; overflow-y: auto; line-height: 1.7; color: #8898a8; font-size: 14px; }
        .passage-review-panel.open { display: block; }

        .question-header { margin-bottom: 16px; }
        .question-number { font-size: 13px; color: #5a6a7a; margin-bottom: 8px; }
        .question-text { font-size: 17px; color: #c8d8e8; margin-bottom: 16px; font-weight: 400; }
        .standard-tag { display: inline-block; font-size: 11px; color: #00bfff; background: rgba(0,191,255,0.1); padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }

        .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option { background-color: #111820; border: 2px solid #1e2d3d; border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 12px; }
        .option:hover:not(.disabled) { border-color: #00ff41; background-color: #152028; }
        .option.selected { border-color: #00ff41; background-color: #152028; }
        .option.correct { border-color: #00cc33; background-color: rgba(0,204,51,0.1); }
        .option.incorrect { border-color: #ff4444; background-color: rgba(255,68,68,0.1); }
        .option.disabled { cursor: not-allowed; }
        .option-letter { display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; background-color: #1e2d3d; border-radius: 50%; font-weight: 700; font-size: 13px; color: #00ff41; flex-shrink: 0; }
        .option.selected .option-letter { background-color: #00ff41; color: #0a0e13; }
        .option.correct .option-letter { background-color: #00cc33; color: white; }
        .option.incorrect .option-letter { background-color: #ff4444; color: white; }
        .option-text { flex: 1; color: #c8d8e8; font-size: 14px; }

        .feedback-box { background-color: #111820; border: 2px solid #1e2d3d; border-radius: 8px; padding: 14px; margin-bottom: 20px; display: none; }
        .feedback-box.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .feedback-box.correct { border-color: #00cc33; }
        .feedback-box.incorrect { border-color: #ff4444; }
        .feedback-label { font-weight: 700; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .feedback-box.correct .feedback-label { color: #00cc33; }
        .feedback-box.incorrect .feedback-label { color: #ff4444; }
        .feedback-text { font-size: 13px; color: #5a6a7a; line-height: 1.5; }

        .btn-primary { background-color: #00ff41; color: #0a0e13; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: 700; font-family: 'Courier New', Courier, monospace; cursor: pointer; transition: all 0.3s ease; width: 100%; letter-spacing: 0.5px; }
        .btn-primary:hover:not(:disabled) { background-color: #33ff66; transform: translateY(-2px); }
        .btn-primary:disabled { background-color: #1e2d3d; color: #5a6a7a; cursor: not-allowed; }
        .btn-secondary { background-color: #00cc33; color: #0a0e13; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Courier New', Courier, monospace; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .btn-secondary:hover { background-color: #00dd44; transform: translateY(-2px); }
        .btn-next { background-color: #00bfff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Courier New', Courier, monospace; cursor: pointer; transition: all 0.3s ease; width: 100%; display: none; }
        .btn-next:hover { background-color: #33ccff; transform: translateY(-2px); }

        .writing-prompt { background-color: #111820; border: 2px solid #1e2d3d; border-radius: 8px; padding: 16px; margin-bottom: 16px; font-size: 14px; color: #5a6a7a; line-height: 1.6; }
        .writing-textarea { width: 100%; min-height: 180px; padding: 16px; border: 2px solid #1e2d3d; border-radius: 8px; background-color: #111820; color: #c8d8e8; font-family: 'Courier New', Courier, monospace; font-size: 15px; line-height: 1.6; resize: vertical; transition: border-color 0.3s ease; }
        .writing-textarea:focus { outline: none; border-color: #00ff41; }
        .writing-textarea::placeholder { color: #3a4a5a; }
        .word-counter { font-size: 12px; color: #5a6a7a; margin-top: 8px; margin-bottom: 12px; }
        .word-counter.warning { color: #ff4444; }

        .summary-container { flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .summary-title { text-align: center; font-size: 24px; color: #00ff41; margin-bottom: 8px; font-weight: 400; }
        .summary-card { background-color: #111820; border: 2px solid #1e2d3d; border-radius: 12px; padding: 16px; }
        .summary-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1e2d3d; }
        .summary-item:last-child { border-bottom: none; }
        .summary-icon { font-size: 18px; min-width: 24px; }
        .summary-label { flex: 1; color: #5a6a7a; font-size: 14px; }
        .summary-value { color: #00ff41; font-weight: 700; font-size: 14px; }
        .summary-value.good { color: #00cc33; }
        .summary-value.ok { color: #ffaa00; }
        .summary-value.weak { color: #ff4444; }

        .phase-transition { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 20px; text-align: center; }
        .phase-transition h2 { color: #00cc33; font-size: 20px; font-weight: 400; }
        .phase-transition .score { font-size: 36px; color: #00ff41; font-weight: 700; }
        .phase-transition .next-up { font-size: 14px; color: #5a6a7a; margin-top: 12px; }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background-color: #111820; border: 2px solid #1e2d3d; border-radius: 12px; padding: 30px; max-width: 400px; text-align: center; }
        .modal-title { font-size: 20px; color: #00ff41; margin-bottom: 12px; font-weight: 400; }
        .modal-text { color: #5a6a7a; margin-bottom: 24px; font-size: 14px; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; font-family: 'Courier New', Courier, monospace; cursor: pointer; transition: all 0.3s ease; }
        .modal-btn.confirm { background-color: #ff4444; color: white; }
        .modal-btn.confirm:hover { background-color: #ff6666; }
        .modal-btn.cancel { background-color: #1e2d3d; color: #00ff41; }
        .modal-btn.cancel:hover { background-color: #2e3d4d; }

        .weakness-callout { background: linear-gradient(135deg, rgba(0,191,255,0.08) 0%, rgba(0,255,65,0.04) 100%); border: 1px solid rgba(0,191,255,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #00bfff; }
        .weakness-callout .callout-label { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

        @media (max-width: 480px) { .container { padding: 16px; } .reading-title { font-size: 18px; } .subject-header h2 { font-size: 20px; } }
        @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" id="backBtn" title="Return to Dashboard">&#8592;</button>
            <div class="timer-display">Mission: <span class="elapsed" id="elapsedTime">0:00</span></div>
            <div style="width: 32px;"></div>
        </div>

        <div class="phase-bar" id="phaseBar"></div>
        <div class="phase-label-bar" id="phaseLabelBar"></div>

        <div class="screen" id="loadingScreen">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <div class="loading-text">Doug is preparing your mission...</div>
            </div>
        </div>

        <div class="screen" id="contentScreen">
            <div class="subject-header">
                <div class="subject-icon" id="subjectIcon"></div>
                <h2 id="subjectTitle"></h2>
                <div class="subject-meta" id="subjectMeta"></div>
            </div>
            <div class="weakness-callout" id="weaknessCallout" style="display:none;">
                <div class="callout-label">Targeting Your Weak Areas</div>
                <div id="weaknessText"></div>
            </div>
            <div id="readingArea" style="display:none;">
                <h3 class="reading-title" id="readingTitle"></h3>
                <div class="reading-meta">
                    <span><strong id="wordCount">0</strong> words</span>
                    <span>~<strong id="readTime">0</strong> min read</span>
                </div>
                <div class="reading-content" id="readingContent"></div>
                <button class="btn-secondary" id="finishReadingBtn" onclick="finishReading()">Complete Reading</button>
            </div>
            <div id="passageReviewArea" style="display:none;">
                <div class="passage-review-toggle" id="passageReviewToggle" onclick="togglePassageReview()">
                    <span class="toggle-arrow">&#9654;</span>
                    <span>Review Passage</span>
                </div>
                <div class="passage-review-panel" id="passageReviewPanel"></div>
            </div>
            <div id="questionArea" style="display:none;">
                <div class="question-header">
                    <div class="question-number" id="questionNumber"></div>
                    <div class="standard-tag" id="standardTag" style="display:none;"></div>
                    <div class="question-text" id="questionText"></div>
                </div>
                <div class="options-list" id="optionsList"></div>
                <div class="feedback-box" id="feedbackBox">
                    <div class="feedback-label" id="feedbackLabel"></div>
                    <div class="feedback-text" id="feedbackText"></div>
                </div>
                <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Next Question</button>
            </div>
            <div id="writingArea" style="display:none;">
                <div class="writing-prompt" id="writingPrompt"></div>
                <textarea class="writing-textarea" id="writingTextarea" placeholder="Enter your response here..."></textarea>
                <div class="word-counter" id="wordCounter">0 words (50 minimum)</div>
                <button class="btn-primary" id="submitWritingBtn" disabled onclick="submitWriting()">Submit Entry</button>
            </div>
        </div>

        <div class="screen" id="transitionScreen">
            <div class="phase-transition">
                <div id="transitionIcon" style="font-size:48px;"></div>
                <h2 id="transitionTitle"></h2>
                <div class="score" id="transitionScore"></div>
                <div class="next-up" id="transitionNext"></div>
            </div>
        </div>

        <div class="screen" id="summaryScreen">
            <div class="summary-container">
                <h2 class="summary-title">MISSION COMPLETE</h2>
                <div class="summary-card" id="summaryCard"></div>
                <button class="btn-primary" onclick="returnToDashboard()">Return to Base</button>
            </div>
        </div>
    </div>

    <div class="modal" id="exitModal">
        <div class="modal-content">
            <div class="modal-title">Abort Mission?</div>
            <div class="modal-text">Your progress will be saved, but you'll need to continue later.</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="document.getElementById('exitModal').classList.remove('show')">Stay</button>
                <button class="modal-btn confirm" onclick="window.location.href='Chase_Dashboard.html'">Leave</button>
            </div>
        </div>
    </div>

    <script>
    const CONFIG = {
        student: 'Chase',
        studentLower: 'chase',
        grade: 5,
        tutor: 'Doug',
        mode: 'leap_prep',
        leapDate: '2026-04-23',
        dashboardUrl: 'Chase_Dashboard.html',
        sessionKey: 'chase_session_v2',
        signalKey: 'chase_session_signal'
    };

    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-nDlBMubq1I-u9M-fpkhwJbfROgyOXjgXjXmJtQuAPUjXvSn0vzO9yDQ0GJmUHSTPrA/exec';
    const TODAY = new Date().toISOString().split('T')[0];
    const IS_WEDNESDAY = new Date().getDay() === 3;

    if (TODAY > CONFIG.leapDate && CONFIG.mode === 'leap_prep') {
        CONFIG.mode = 'act_prep';
    }

    const PHASES = [
        { id: 'ela_reading', name: 'ELA Reading', icon: '\u{1F4D6}', minutes: 15, questionCount: 5,
          description: 'Read a passage and answer comprehension questions' },
        { id: 'ela_language', name: 'ELA Language', icon: '\u270D\uFE0F', minutes: 8, questionCount: 4,
          description: IS_WEDNESDAY ? 'Grammar, vocabulary, and a writing prompt' : 'Grammar, vocabulary, and language skills' },
        { id: 'math', name: 'Mathematics', icon: '\u{1F522}', minutes: 12, questionCount: 6,
          description: 'Grade 5 math problems' },
        { id: 'science', name: 'Science', icon: '\u{1F52C}', minutes: 8, questionCount: 4,
          description: 'Life, Earth, and Physical Science' },
        { id: 'social_studies', name: 'Social Studies', icon: '\u{1F30D}', minutes: 7, questionCount: 4,
          description: 'U.S. history, civics, geography, economics' }
    ];

    const STANDARDS = {
        ela_reading: ['RL.5.1','RL.5.2','RL.5.3','RL.5.4','RL.5.5','RL.5.6','RI.5.1','RI.5.2','RI.5.3','RI.5.4','RI.5.5','RI.5.6','RI.5.7','RI.5.8'],
        ela_language: ['L.5.1','L.5.2','L.5.3','L.5.4','L.5.5','L.5.6','W.5.1','W.5.2','W.5.3'],
        math: ['5.OA.1','5.OA.2','5.OA.3','5.NBT.1','5.NBT.2','5.NBT.3','5.NBT.5','5.NBT.6','5.NBT.7','5.NF.1','5.NF.2','5.NF.3','5.NF.4','5.NF.5','5.NF.6','5.NF.7','5.MD.1','5.MD.2','5.MD.3','5.MD.4','5.MD.5','5.G.1','5.G.2','5.G.3','5.G.4'],
        science: ['5-LS1','5-LS2','5-ESS1','5-ESS2','5-PS1','5-PS2'],
        social_studies: ['USH.5.1','USH.5.2','USH.5.3','USH.5.4','GEO.5.1','GEO.5.2','CIV.5.1','CIV.5.2','ECON.5.1','ECON.5.2']
    };

    let currentPhaseIndex = -1;
    let currentQuestionIndex = 0;
    let sessionStartTime = Date.now();
    let phaseStartTime = null;
    let weaknessProfile = null;
    let timerInterval = null;
    let phaseResults = {};
    let currentPassage = null;
    let currentQuestions = [];
    let currentAnswers = {};
    let writingResponse = '';

    const FALLBACK_PASSAGES = [
        {
            title: 'How Robots Learn to Walk',
            passage: '<p>Building a robot that can walk is one of the hardest challenges in engineering. Unlike wheels, which roll smoothly on flat surfaces, legs must constantly adjust to uneven ground, stairs, and obstacles.</p><p>Engineers at Boston Dynamics spent over a decade teaching their robot Atlas to walk. The key breakthrough was using sensors in the robot\'s feet that detect pressure changes 1,000 times per second. When Atlas steps on a pebble, its computer brain adjusts the other leg\'s position within milliseconds.</p><p>The process works like this: cameras and lidar sensors scan the ground ahead, creating a 3D map. The computer plans each footstep, calculating exactly where to place each foot. But the real world is messy \u2014 the ground might shift, wind might push the robot, or an object might appear unexpectedly. That\'s where the pressure sensors come in, making instant corrections.</p><p>Recently, Atlas learned to do backflips. This required combining everything \u2014 balance, speed, strength, and split-second calculations. Engineers say the hardest part wasn\'t the flip itself, but teaching Atlas to land without falling over.</p>',
            questions: [
                { text: 'Why is building a walking robot harder than a wheeled robot?', options: ['Walking robots are more expensive','Legs must constantly adjust to uneven terrain','Wheels are newer technology','Walking robots need bigger batteries'], correct: 1, explanation: 'The passage states legs "must constantly adjust to uneven ground, stairs, and obstacles."', standard: 'RI.5.1' },
                { text: 'What is the main purpose of the pressure sensors in Atlas\'s feet?', options: ['To measure the robot\'s weight','To detect temperature changes','To make instant corrections when stepping on uneven surfaces','To help the robot jump'], correct: 2, explanation: 'The sensors "detect pressure changes" so the computer can adjust "within milliseconds."', standard: 'RI.5.2' },
                { text: 'Based on the passage, what does the word "lidar" most likely refer to?', options: ['A type of camera','A sensor technology that helps create 3D maps','A computer program','A type of robot leg'], correct: 1, explanation: 'Context shows lidar is used alongside cameras to scan ground and create 3D maps.', standard: 'RI.5.4' },
                { text: 'Which sentence best summarizes the main idea of the passage?', options: ['Robots are better than humans at walking.','Teaching robots to walk requires complex sensor systems and constant adjustments.','Boston Dynamics is the best robot company.','Atlas can do backflips.'], correct: 1, explanation: 'The passage focuses on the complexity of the sensors, calculations, and adjustments needed for robot walking.', standard: 'RI.5.2' },
                { text: 'According to the passage, what was the hardest part of teaching Atlas to backflip?', options: ['Building strong enough legs','Programming the flip motion','Teaching it to land without falling','Getting enough speed'], correct: 2, explanation: 'Engineers said "the hardest part wasn\'t the flip itself, but teaching Atlas to land without falling over."', standard: 'RI.5.1' }
            ],
            writingPrompt: 'If you could design a robot to help with one task at home or school, what would it do? Describe how it would work and why it would be useful. Use at least two details about how the robot\'s sensors or systems would function.'
        }
    ];

    const FALLBACK_QUESTIONS = {
        ela_language: [
            { text: 'Which sentence has correct subject-verb agreement?', options: ['The dogs runs fast.','The dogs run fast.','The dogs is running fast.','The dogs be fast.'], correct: 1, explanation: 'Plural subject "dogs" requires plural verb "run."', standard: 'L.5.1' },
            { text: 'What does the prefix "un-" mean in the word "unhappy"?', options: ['Very','Not','Again','Before'], correct: 1, explanation: 'The prefix "un-" means "not," so unhappy means not happy.', standard: 'L.5.4' },
            { text: 'Which word is an antonym of "generous"?', options: ['Kind','Selfish','Giving','Wealthy'], correct: 1, explanation: 'An antonym is the opposite. Selfish is the opposite of generous.', standard: 'L.5.5' },
            { text: 'Choose the correctly punctuated sentence.', options: ['Lets go to the store said Mom.','Let\'s go to the store," said Mom.','Let\'s go to the store, said Mom.','"Let\'s go to the store," said Mom.'], correct: 3, explanation: 'Direct quotes need quotation marks around the spoken words with comma before the tag.', standard: 'L.5.2' }
        ],
        math: [
            { text: 'What is 3/4 + 1/2?', options: ['4/6','1','5/4','1 1/4'], correct: 2, explanation: 'Convert 1/2 to 2/4, then 3/4 + 2/4 = 5/4.', standard: '5.NF.1' },
            { text: 'What is 45.6 \u00d7 10?', options: ['4.56','456','4,560','45.60'], correct: 1, explanation: 'When multiplying by 10, move the decimal point one place to the right: 456.', standard: '5.NBT.2' },
            { text: 'What is the volume of a rectangular prism with length 4 cm, width 3 cm, and height 2 cm?', options: ['9 cm\u00b3','18 cm\u00b3','24 cm\u00b3','26 cm\u00b3'], correct: 2, explanation: 'Volume = l \u00d7 w \u00d7 h = 4 \u00d7 3 \u00d7 2 = 24 cm\u00b3.', standard: '5.MD.5' },
            { text: 'Which expression equals 3 \u00d7 (4 + 5)?', options: ['3 \u00d7 4 + 5','3 \u00d7 4 + 3 \u00d7 5','12 + 5','3 + 4 \u00d7 5'], correct: 1, explanation: 'Distributive property: 3 \u00d7 (4 + 5) = 3 \u00d7 4 + 3 \u00d7 5 = 12 + 15 = 27.', standard: '5.OA.1' },
            { text: 'Round 3.847 to the nearest tenth.', options: ['3.8','3.85','3.9','4.0'], correct: 0, explanation: 'Look at the hundredths digit (4). Since 4 < 5, round down: 3.8.', standard: '5.NBT.4' },
            { text: 'What fraction of an hour is 15 minutes?', options: ['1/2','1/3','1/4','1/5'], correct: 2, explanation: '15 minutes out of 60 minutes = 15/60 = 1/4.', standard: '5.NF.3' }
        ],
        science: [
            { text: 'What do plants need to perform photosynthesis?', options: ['Water, soil, and darkness','Sunlight, water, and carbon dioxide','Only sunlight','Oxygen and sugar'], correct: 1, explanation: 'Photosynthesis requires sunlight, water, and carbon dioxide to produce sugar and oxygen.', standard: '5-LS1' },
            { text: 'What causes day and night on Earth?', options: ['The moon blocking the sun','Earth orbiting the sun','Earth rotating on its axis','The sun moving across the sky'], correct: 2, explanation: 'Earth rotates on its axis once every 24 hours, causing the cycle of day and night.', standard: '5-ESS1' },
            { text: 'Which is an example of a chemical change?', options: ['Ice melting','Paper being cut','Wood burning','Water evaporating'], correct: 2, explanation: 'Burning wood creates new substances (ash, smoke, CO2) \u2014 a chemical change.', standard: '5-PS1' },
            { text: 'In a food chain, what is the role of a decomposer?', options: ['Produce food from sunlight','Hunt other animals','Break down dead organisms','Eat only plants'], correct: 2, explanation: 'Decomposers break down dead organisms, returning nutrients to the soil.', standard: '5-LS2' }
        ],
        social_studies: [
            { text: 'Which document declared the American colonies independent from Britain?', options: ['The Constitution','The Bill of Rights','The Declaration of Independence','The Magna Carta'], correct: 2, explanation: 'The Declaration of Independence, adopted July 4, 1776, declared independence from Britain.', standard: 'USH.5.2' },
            { text: 'What are the three branches of the U.S. government?', options: ['President, Congress, Army','Legislative, Executive, Judicial','Federal, State, Local','Senate, House, Court'], correct: 1, explanation: 'The three branches are Legislative (makes laws), Executive (enforces laws), and Judicial (interprets laws).', standard: 'CIV.5.1' },
            { text: 'What is supply and demand?', options: ['A type of tax','How much of something is available and how much people want it','A government law','A type of trade agreement'], correct: 1, explanation: 'Supply is how much is available; demand is how much people want it. Together they affect prices.', standard: 'ECON.5.1' },
            { text: 'Which geographic region of the U.S. has the most mountains?', options: ['Southeast','Midwest','West','Northeast'], correct: 2, explanation: 'The Western U.S. contains major mountain ranges including the Rockies, Sierra Nevada, and Cascades.', standard: 'GEO.5.1' }
        ]
    };

    document.addEventListener('DOMContentLoaded', () => {
        initPhaseBar();
        showScreen('loadingScreen');
        startTimer();
        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('exitModal').classList.add('show');
        });
        loadWeaknessProfile().then(() => {
            setTimeout(() => startPhase(0), 1200);
        });
    });

    function initPhaseBar() {
        const bar = document.getElementById('phaseBar');
        const labels = document.getElementById('phaseLabelBar');
        PHASES.forEach((p, i) => {
            const seg = document.createElement('div');
            seg.className = 'phase-segment';
            seg.id = 'phaseSeg' + i;
            bar.appendChild(seg);
            const lbl = document.createElement('div');
            lbl.className = 'phase-label';
            lbl.id = 'phaseLbl' + i;
            lbl.textContent = p.name.replace('ELA ','').replace('Social Studies','SS');
            labels.appendChild(lbl);
        });
    }

    function updatePhaseBar(activeIndex) {
        PHASES.forEach((_, i) => {
            const seg = document.getElementById('phaseSeg' + i);
            const lbl = document.getElementById('phaseLbl' + i);
            seg.className = 'phase-segment' + (i < activeIndex ? ' completed' : i === activeIndex ? ' active' : '');
            lbl.className = 'phase-label' + (i < activeIndex ? ' completed' : i === activeIndex ? ' active' : '');
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const sec = Math.floor((Date.now() - sessionStartTime) / 1000);
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            document.getElementById('elapsedTime').textContent = m + ':' + (s < 10 ? '0' : '') + s;
        }, 1000);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function loadWeaknessProfile() {
        try {
            const resp = await fetch(APPS_SCRIPT_URL + '?action=getWeaknessProfile&student=' + CONFIG.student, { signal: AbortSignal.timeout(8000) });
            if (resp.ok) { weaknessProfile = await resp.json(); return; }
        } catch (e) {}
        weaknessProfile = { student: CONFIG.student, weaknesses: {}, strengths: {} };
    }

    function getTargetStandards(phaseId) {
        if (weaknessProfile && weaknessProfile.weaknesses && weaknessProfile.weaknesses[phaseId]) {
            const weak = weaknessProfile.weaknesses[phaseId];
            if (weak.length > 0) return weak.map(w => w.standard);
        }
        const all = STANDARDS[phaseId] || [];
        return [...all].sort(() => Math.random() - 0.5).slice(0, 4);
    }

    function getDifficulty(phaseId) {
        if (weaknessProfile && weaknessProfile.weaknesses && weaknessProfile.weaknesses[phaseId]) {
            return weaknessProfile.weaknesses[phaseId].length > 0 ? 'grade-level' : 'challenging';
        }
        return 'grade-level';
    }

    async function startPhase(index) {
        currentPhaseIndex = index;
        currentQuestionIndex = 0;
        currentAnswers = {};
        currentQuestions = [];
        currentPassage = null;
        phaseStartTime = Date.now();

        if (index >= PHASES.length) { finishSession(); return; }

        updatePhaseBar(index);
        const phase = PHASES[index];
        showScreen('contentScreen');
        document.getElementById('subjectIcon').textContent = phase.icon;
        document.getElementById('subjectTitle').textContent = phase.name;
        document.getElementById('subjectMeta').textContent = phase.description + ' (~' + phase.minutes + ' min)';

        const callout = document.getElementById('weaknessCallout');
        if (weaknessProfile && weaknessProfile.weaknesses && weaknessProfile.weaknesses[phase.id] && weaknessProfile.weaknesses[phase.id].length > 0) {
            document.getElementById('weaknessText').textContent = 'Focus areas: ' + weaknessProfile.weaknesses[phase.id].map(w => w.skill).join(', ');
            callout.style.display = 'block';
        } else { callout.style.display = 'none'; }

        document.getElementById('readingArea').style.display = 'none';
        document.getElementById('passageReviewArea').style.display = 'none';
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('writingArea').style.display = 'none';

        if (phase.id === 'ela_reading') { await loadELAReading(); }
        else if (phase.id === 'ela_language') { await loadELALanguage(); }
        else { await loadSubjectQuestions(phase.id, phase.questionCount); }
    }

    async function loadELAReading() {
        document.getElementById('readingArea').style.display = 'block';
        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'generatePassage', student: CONFIG.studentLower, topic: null,
                    standards: getTargetStandards('ela_reading'), difficulty: getDifficulty('ela_reading'),
                    includeEBSR: true, mode: CONFIG.mode }) });
        } catch (e) {}
        const fb = FALLBACK_PASSAGES[Math.floor(Math.random() * FALLBACK_PASSAGES.length)];
        currentPassage = fb; currentQuestions = fb.questions;
        document.getElementById('readingTitle').textContent = fb.title;
        document.getElementById('readingContent').innerHTML = fb.passage;
        const words = fb.passage.replace(/<[^>]+>/g, '').split(/\s+/).length;
        document.getElementById('wordCount').textContent = words;
        document.getElementById('readTime').textContent = Math.max(1, Math.round(words / 200));
    }

    function finishReading() {
        document.getElementById('readingArea').style.display = 'none';
        document.getElementById('passageReviewArea').style.display = 'block';
        document.getElementById('passageReviewPanel').innerHTML = currentPassage.passage;
        document.getElementById('questionArea').style.display = 'block';
        displayQuestion(0);
    }

    async function loadELALanguage() {
        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'generateContent', student: CONFIG.student, grade: CONFIG.grade,
                    subject: 'ela_language', standards: getTargetStandards('ela_language'),
                    difficulty: getDifficulty('ela_language'), mode: CONFIG.mode, count: IS_WEDNESDAY ? 3 : 4 }) });
        } catch (e) {}
        if (currentQuestions.length === 0) {
            currentQuestions = [...FALLBACK_QUESTIONS.ela_language].sort(() => Math.random() - 0.5).slice(0, IS_WEDNESDAY ? 3 : 4);
        }
        document.getElementById('questionArea').style.display = 'block';
        displayQuestion(0);
    }

    async function loadSubjectQuestions(subjectId, count) {
        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: 'generateContent', student: CONFIG.student, grade: CONFIG.grade,
                    subject: subjectId, standards: getTargetStandards(subjectId),
                    difficulty: getDifficulty(subjectId), mode: CONFIG.mode, count: count }) });
        } catch (e) {}
        if (currentQuestions.length === 0) {
            currentQuestions = [...(FALLBACK_QUESTIONS[subjectId] || [])].sort(() => Math.random() - 0.5).slice(0, count);
        }
        document.getElementById('questionArea').style.display = 'block';
        displayQuestion(0);
    }

    function displayQuestion(index) {
        currentQuestionIndex = index;
        const q = currentQuestions[index];
        if (!q) return;
        document.getElementById('questionNumber').textContent = 'Question ' + (index + 1) + ' of ' + currentQuestions.length;
        document.getElementById('questionText').textContent = q.text;
        if (q.standard) { document.getElementById('standardTag').textContent = q.standard; document.getElementById('standardTag').style.display = 'inline-block'; }
        else { document.getElementById('standardTag').style.display = 'none'; }

        const optList = document.getElementById('optionsList');
        optList.innerHTML = '';
        const letters = ['A','B','C','D'];
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span class="option-text">' + opt + '</span>';
            div.onclick = () => selectAnswer(i);
            optList.appendChild(div);
        });
        document.getElementById('feedbackBox').className = 'feedback-box';
        document.getElementById('feedbackBox').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
    }

    function selectAnswer(index) {
        const q = currentQuestions[currentQuestionIndex];
        if (currentAnswers[currentQuestionIndex] !== undefined) return;
        currentAnswers[currentQuestionIndex] = index;
        const options = document.querySelectorAll('#optionsList .option');
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === q.correct) opt.classList.add('correct');
            if (i === index && i !== q.correct) opt.classList.add('incorrect');
            if (i === index) opt.classList.add('selected');
        });
        const fb = document.getElementById('feedbackBox');
        const isCorrect = index === q.correct;
        fb.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'incorrect');
        fb.style.display = 'block';
        document.getElementById('feedbackLabel').textContent = isCorrect ? '\u2713 Correct' : '\u2717 Incorrect';
        document.getElementById('feedbackText').textContent = q.explanation || '';

        const btn = document.getElementById('nextBtn');
        const isLast = currentQuestionIndex >= currentQuestions.length - 1;
        const phase = PHASES[currentPhaseIndex];
        const showWritingAfter = phase.id === 'ela_language' && IS_WEDNESDAY && currentPassage && currentPassage.writingPrompt;
        if (isLast && showWritingAfter) btn.textContent = 'Continue to Writing';
        else if (isLast) btn.textContent = currentPhaseIndex < PHASES.length - 1 ? 'Continue to Next Subject' : 'View Results';
        else btn.textContent = 'Next Question';
        btn.style.display = 'block';
    }

    function nextQuestion() {
        const phase = PHASES[currentPhaseIndex];
        const isLast = currentQuestionIndex >= currentQuestions.length - 1;
        const showWritingAfter = phase.id === 'ela_language' && IS_WEDNESDAY && currentPassage && currentPassage.writingPrompt;
        if (isLast && showWritingAfter) { document.getElementById('questionArea').style.display = 'none'; document.getElementById('passageReviewArea').style.display = 'none'; showWritingPhase(); return; }
        if (isLast) { completePhase(); return; }
        displayQuestion(currentQuestionIndex + 1);
    }

    function showWritingPhase() {
        document.getElementById('writingArea').style.display = 'block';
        document.getElementById('writingPrompt').textContent = currentPassage.writingPrompt;
        document.getElementById('writingTextarea').value = '';
        document.getElementById('wordCounter').textContent = '0 words (50 minimum)';
        document.getElementById('submitWritingBtn').disabled = true;
        document.getElementById('writingTextarea').addEventListener('input', function() {
            const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
            const counter = document.getElementById('wordCounter');
            counter.textContent = words + ' words' + (words < 50 ? ' (50 minimum)' : '');
            counter.className = 'word-counter' + (words < 50 ? ' warning' : '');
            document.getElementById('submitWritingBtn').disabled = words < 50;
        });
    }

    function submitWriting() { writingResponse = document.getElementById('writingTextarea').value; document.getElementById('writingArea').style.display = 'none'; completePhase(); }

    function togglePassageReview() {
        document.getElementById('passageReviewToggle').classList.toggle('open');
        document.getElementById('passageReviewPanel').classList.toggle('open');
    }

    function completePhase() {
        const phase = PHASES[currentPhaseIndex];
        const correct = Object.values(currentAnswers).filter((a, i) => a === currentQuestions[i].correct).length;
        const total = currentQuestions.length;
        const pct = total > 0 ? Math.round(correct / total * 100) : 0;
        phaseResults[phase.id] = { correct, total, pct, answers: currentAnswers, questions: currentQuestions, timeMs: Date.now() - phaseStartTime, writingResponse: phase.id === 'ela_language' ? writingResponse : null };

        showScreen('transitionScreen');
        document.getElementById('transitionIcon').textContent = phase.icon;
        document.getElementById('transitionTitle').textContent = phase.name + ' Complete';
        document.getElementById('transitionScore').textContent = correct + '/' + total + ' (' + pct + '%)';
        const nextIndex = currentPhaseIndex + 1;
        document.getElementById('transitionNext').textContent = nextIndex < PHASES.length ? 'Next: ' + PHASES[nextIndex].icon + ' ' + PHASES[nextIndex].name : 'All subjects complete!';
        setTimeout(() => startPhase(currentPhaseIndex + 1), 2500);
    }

    function finishSession() {
        clearInterval(timerInterval);
        updatePhaseBar(PHASES.length);
        const totalTime = Math.round((Date.now() - sessionStartTime) / 60000);
        let totalCorrect = 0, totalQuestions = 0;
        const card = document.getElementById('summaryCard');
        let html = '';
        PHASES.forEach(phase => {
            const result = phaseResults[phase.id];
            if (!result) return;
            totalCorrect += result.correct; totalQuestions += result.total;
            const pct = result.pct;
            const cls = pct >= 80 ? 'good' : pct >= 60 ? 'ok' : 'weak';
            html += '<div class="summary-item"><span class="summary-icon">' + phase.icon + '</span><span class="summary-label">' + phase.name + ' (' + Math.round(result.timeMs/60000) + ' min)</span><span class="summary-value ' + cls + '">' + result.correct + '/' + result.total + ' (' + pct + '%)</span></div>';
        });
        if (writingResponse) html += '<div class="summary-item"><span class="summary-icon">\u270D\uFE0F</span><span class="summary-label">Mission Log Entry</span><span class="summary-value good">Submitted</span></div>';
        const overallPct = totalQuestions > 0 ? Math.round(totalCorrect / totalQuestions * 100) : 0;
        html += '<div style="margin-top:12px;text-align:center;padding:12px;background:rgba(0,255,65,0.08);border:1px solid #00ff41;border-radius:8px;"><div style="font-size:12px;color:#5a6a7a;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Overall</div><div style="font-size:28px;color:#00ff41;font-weight:700;">' + totalCorrect + '/' + totalQuestions + '</div><div style="font-size:14px;color:#5a6a7a;">' + overallPct + '% correct \u00b7 ' + totalTime + ' minutes</div></div>';
        card.innerHTML = html;
        showScreen('summaryScreen');
        saveSession(totalCorrect, totalQuestions, totalTime, overallPct);
        syncSession(totalCorrect, totalQuestions, totalTime, overallPct);
    }

    function saveSession(correct, total, duration, pct) {
        const data = { completed: true, date: TODAY, timestamp: new Date().toISOString(), correct, total, pct, duration, phases: {}, writingCompleted: !!writingResponse, mode: CONFIG.mode };
        PHASES.forEach(p => { if (phaseResults[p.id]) data.phases[p.id] = { correct: phaseResults[p.id].correct, total: phaseResults[p.id].total, pct: phaseResults[p.id].pct, timeMin: Math.round(phaseResults[p.id].timeMs / 60000) }; });
        try { localStorage.setItem(CONFIG.sessionKey, JSON.stringify({ [TODAY]: data })); localStorage.setItem(CONFIG.signalKey, JSON.stringify({ completed: true, timestamp: data.timestamp, date: TODAY, points: 15 })); } catch (e) {}
    }

    function syncSession(correct, total, duration, pct) {
        const subjectBreakdown = {};
        PHASES.forEach(p => { if (phaseResults[p.id]) subjectBreakdown[p.id] = phaseResults[p.id].pct + '%'; });
        try { fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'saveSession', student: CONFIG.student, date: TODAY, topic: PHASES.map(p => p.name).join('; '), questionsCorrect: correct, questionsTotal: total, comprehensionPct: pct, writingCompleted: !!writingResponse, points: 15, durationMinutes: duration, mode: CONFIG.mode, subjectBreakdown: subjectBreakdown }) }); } catch (e) {}
        try { fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'saveDailyTracking', date: TODAY, student: CONFIG.student, session: true, comprehensionPct: pct, sessionBonus: pct >= 80 ? 2 : pct >= 60 ? 1 : 0 }) }); } catch (e) {}
    }

    function returnToDashboard() { window.location.href = CONFIG.dashboardUrl; }

    window.addEventListener('beforeunload', () => {
        if (currentPhaseIndex >= 0 && currentPhaseIndex < PHASES.length) {
            try { localStorage.setItem(CONFIG.sessionKey + '_partial', JSON.stringify({ date: TODAY, phaseIndex: currentPhaseIndex, phaseResults, timestamp: new Date().toISOString() })); } catch (e) {}
        }
    });
    </script>
</body>
</html>
