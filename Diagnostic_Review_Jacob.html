<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Scholar's Review — with Gary</title>
    <style>
        :root {
            --bg: #1a1510;
            --card-bg: #231e17;
            --accent: #c9a84c;
            --secondary: #8b7355;
            --text: #e8dcc8;
            --text-muted: #a9957d;
            --correct: #4ade80;
            --incorrect: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: Georgia, serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            color: var(--bg);
        }

        .header p {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.95;
            color: var(--bg);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            gap: 10px;
            background-color: rgba(201, 168, 76, 0.1);
            border-bottom: 1px solid var(--accent);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: Georgia, serif;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(201, 168, 76, 0.3);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover {
            background-color: var(--accent);
            color: var(--bg);
        }

        .main {
            flex: 1;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
        }

        .no-results-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .no-results h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .no-results p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .summary {
            background-color: var(--card-bg);
            border-left: 5px solid var(--accent);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            text-align: center;
        }

        .summary h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .score-item {
            text-align: center;
        }

        .score-number {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent);
        }

        .score-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-text {
            color: var(--text);
            margin-top: 20px;
            font-size: 16px;
        }

        .review-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .review-item {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(201, 168, 76, 0.2);
        }

        .review-header {
            background-color: rgba(201, 168, 76, 0.15);
            padding: 20px;
            border-bottom: 1px solid var(--accent);
        }

        .review-question-num {
            font-size: 12px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .review-question-text {
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.5;
        }

        .passage {
            background-color: rgba(201, 168, 76, 0.08);
            padding: 15px;
            margin: 15px 0;
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }

        .passage-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 14px;
        }

        .review-content {
            padding: 20px;
        }

        .answer-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .answer-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .answer-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .answer-text {
            font-size: 14px;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .answer-incorrect {
            background-color: rgba(248, 113, 113, 0.15);
            border: 2px solid var(--incorrect);
            color: var(--text);
        }

        .answer-correct {
            background-color: rgba(74, 222, 128, 0.15);
            border: 2px solid var(--correct);
            color: var(--text);
        }

        .tutor-button {
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
        }

        .tutor-button:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
        }

        .tutor-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tutor-response {
            background-color: rgba(201, 168, 76, 0.1);
            border-left: 4px solid var(--accent);
            padding: 20px;
            margin-top: 15px;
            border-radius: 6px;
            display: none;
        }

        .tutor-response.active {
            display: block;
        }

        .tutor-label {
            font-size: 12px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .tutor-message {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 15px;
        }

        .tutor-loading {
            color: var(--accent);
            font-style: italic;
        }

        .got-it-btn {
            background-color: var(--secondary);
            color: var(--text);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
        }

        .got-it-btn:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
        }

        .completion-message {
            background-color: rgba(201, 168, 76, 0.15);
            border: 2px solid var(--accent);
            padding: 40px 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 50px;
        }

        .completion-message h3 {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .completion-message p {
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .main {
                padding: 15px;
            }

            .summary {
                padding: 20px;
            }

            .score {
                gap: 30px;
            }

            .score-number {
                font-size: 28px;
            }

            .review-question-text {
                font-size: 16px;
            }

            .answer-text {
                font-size: 13px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

                        options: [
                            "To give up easily",
                            "To keep trying despite difficulties",
                            "To move quickly",
                            "To forget something"
                        ],
                        correct: 1
                    },
                    {
                        text: "Which word is a synonym for 'conceal'?",
                        options: [
                            "Reveal",
                            "Hide",
                            "Display",
                            "Show"
                        ],
                        correct: 1
                    },
                    {
                        text: "Complete the analogy: Book is to author as painting is to ___",
                        options: [
                            "Canvas",
                            "Paint",
                            "Artist",
                            "Frame"
                        ],
                        correct: 2
                    },
                    {
                        text: "Which word means 'very old or from a long time ago'?",
                        options: [
                            "Modern",
                            "Ancient",
                            "Recent",
                            "New"
                        ],
                        correct: 1
                    },
                    {
                        text: "What is the relationship between these words: Dog, Wolf, Animal",
                        options: [
                            "Dog and wolf are the same thing",
                            "Dog and wolf are both types of animals",
                            "Animal is a type of dog",
                            "Wolf is less important than a dog"
                        ],
                        correct: 1
                    },
                    {
                        text: "Which word is a synonym for 'triumph'?",
                        options: [
                            "Failure",
                            "Loss",
                            "Victory",
                            "Defeat"
                        ],
                        correct: 2
                    }
                ]
            }
        ];

        const STORAGE_KEY = 'diagnosticResults_targeted_diagnostic_20260306';
        const PENDING_KEY = 'pending_assessment_comprehensive_diagnostic_20260301';
        const tutorName = 'Gary';
        const studentName = 'Jacob';

        function loadResults() {
            // Try primary key first (diagnosticResults format)
            let results = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (results && results.answers) return results;

            // Fallback: try pending_assessment format (flat keys like "0-2")
            const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || 'null');
            if (pending && pending.sections) {
                // Convert from submission payload format to review format
                const answers = {};
                let totalQuestions = 0;
                pending.sections.forEach((sec, si) => {
                    answers[si] = {};
                    if (sec.details) {
                        sec.details.forEach((d, qi) => {
                            totalQuestions++;
                            if (d.chosen !== null) {
                                // Find the option index from the chosen text
                                const q = SECTIONS[si]?.questions[qi];
                                if (q) {
                                    const idx = q.options.indexOf(d.chosen);
                                    if (idx >= 0) answers[si][qi] = idx;
                                }
                            }
                        });
                    }
                });
                return { answers, totalQuestions };
            }

            // Last resort: try to reconstruct from flat-key answers in any localStorage key
            // Jacob's test stores answers as answers["sectionIdx-questionIdx"] = optionIndex
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('diagnostic_answers_jacob')) {
                    try {
                        const flatAnswers = JSON.parse(localStorage.getItem(key));
                        return convertFlatAnswers(flatAnswers);
                    } catch(e) {}
                }
            }

            return null;
        }

        function convertFlatAnswers(flatAnswers) {
            const answers = {};
            let totalQuestions = 0;
            SECTIONS.forEach((sec, si) => {
                answers[si] = {};
                sec.questions.forEach((q, qi) => {
                    totalQuestions++;
                    const key = `${si}-${qi}`;
                    if (flatAnswers[key] !== undefined) {
                        answers[si][qi] = flatAnswers[key];
                    }
                });
            });
            return { answers, totalQuestions };
        }

        function init() {
            const results = loadResults();

            if (!results) {
                showNoResults();
                return;
            }

            const { answers, totalQuestions } = results;
            const incorrectQuestions = findIncorrectQuestions(answers);

            if (incorrectQuestions.length === 0) {
                showPerfectScore();
                return;
            }

            renderReview(incorrectQuestions, totalQuestions);
        }

        function findIncorrectQuestions(answers) {
            const incorrect = [];
            let questionIndex = 0;

            SECTIONS.forEach((section, sectionIndex) => {
                section.questions.forEach((question, qIndex) => {
                    if (question.type !== 'writing') {
                        const studentAnswer = answers[sectionIndex]?.[qIndex];
                        if (studentAnswer !== question.correct) {
                            incorrect.push({
                                globalIndex: questionIndex,
                                sectionIndex,
                                questionIndex: qIndex,
                                section: section.title,
                                question,
                                studentAnswer,
                                correctAnswer: question.correct
                            });
                        }
                    }
                    questionIndex++;
                });
            });

            return incorrect;
        }

        function showNoResults() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">⚠️</div>
                    <h2>No diagnostic results found</h2>
                    <p>Make sure you're using the same device you took the test on.</p>
                    <button class="btn btn-primary" onclick="goToDashboard()">Return to Dashboard</button>
                </div>
            `;
        }

        function showPerfectScore() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="summary">
                    <h2>Perfect Score!</h2>
                    <p class="summary-text">You answered every question correctly on your diagnostic assessment. Exceptional scholastic achievement!</p>
                </div>
                <div class="completion-message">
                    <h3>🏆 Mastery Achieved</h3>
                    <p>Your assessment demonstrates comprehensive understanding. Continue your scholarly pursuits with confidence.</p>
                    <button class="btn btn-primary" onclick="goToDashboard()" style="margin-top:20px;">Return to Dashboard</button>
                </div>
            `;
        }

        function renderReview(incorrectQuestions, totalQuestions) {
            const correct = totalQuestions - incorrectQuestions.length;
            const content = document.getElementById('content');

            let html = `
                <div class="summary">
                    <h2>You got ${correct} out of ${totalQuestions} correct</h2>
                    <div class="score">
                        <div class="score-item">
                            <div class="score-number">${correct}/${totalQuestions}</div>
                            <div class="score-label">Correct</div>
                        </div>
                        <div class="score-item">
                            <div class="score-number">${incorrectQuestions.length}</div>
                            <div class="score-label">To Review</div>
                        </div>
                    </div>
                    <p class="summary-text">Let us examine the questions you missed and deepen your understanding through scholarly review.</p>
                </div>

                <div class="review-container">
            `;

            incorrectQuestions.forEach((item, idx) => {
                const q = item.question;
                const passages = SECTIONS[item.sectionIndex].questions.filter(q => q.passage).map(q => q.passage);
                const passageRef = item.question.passageIndex !== undefined ? item.question.passageIndex : null;
                const passage = passageRef !== null ? passages[passageRef] :
                               (item.question.passage ? item.question.passage : null);

                html += `
                    <div class="review-item">
                        <div class="review-header">
                            <div class="review-question-num">Question ${item.globalIndex + 1} • ${item.section}</div>
                            <div class="review-question-text">${escapeHtml(q.text)}</div>
                `;

                if (passage) {
                    html += `
                        <div class="passage">
                            <div class="passage-title">${escapeHtml(passage.title)}</div>
                            <div>${escapeHtml(passage.text)}</div>
                        </div>
                    `;
                }

                html += `</div><div class="review-content">`;

                html += `
                    <div class="answer-row">
                        <div class="answer-label">Your answer:</div>
                        <div class="answer-text answer-incorrect">
                            ${escapeHtml(q.options[item.studentAnswer])}
                        </div>
                    </div>
                    <div class="answer-row">
                        <div class="answer-label">Correct answer:</div>
                        <div class="answer-text answer-correct">
                            ${escapeHtml(q.options[item.correctAnswer])}
                        </div>
                    </div>
                `;

                html += `
                    <button class="tutor-button" onclick="askTutor(${idx}, '${escapeHtml(q.text).replace(/'/g, "\\'")}', '${escapeHtml(q.options[item.studentAnswer]).replace(/'/g, "\\'")}', '${escapeHtml(q.options[item.correctAnswer]).replace(/'/g, "\\'")}')" id="askBtn${idx}">
                        Ask ${tutorName}
                    </button>
                    <div class="tutor-response" id="tutor${idx}">
                        <div class="tutor-label">💬 ${tutorName}'s Explanation</div>
                        <div class="tutor-message" id="tutorMsg${idx}"></div>
                        <button class="got-it-btn" onclick="dismissTutor(${idx})">Got it!</button>
                    </div>
                `;

                html += `</div></div>`;
            });

            html += `</div>`;

            content.innerHTML = html;
            document.getElementById('skipBtn').style.display = 'block';
        }

        function askTutor(index, question, wrongAnswer, correctAnswer) {
            const tutorDiv = document.getElementById(`tutor${index}`);
            const msgDiv = document.getElementById(`tutorMsg${index}`);
            const btn = document.getElementById(`askBtn${index}`);

            msgDiv.innerHTML = '<span class="tutor-loading">Gary is considering this question...</span>';
            tutorDiv.classList.add('active');
            btn.disabled = true;

            const prompt = `You are Gary, a distinguished and scholarly AI tutor for a talented student named Jacob. Jacob answered this question incorrectly on a diagnostic assessment:

Question: "${question}"
Jacob's answer: "${wrongAnswer}"
Correct answer: "${correctAnswer}"

Explain in a refined, classical scholarly tone why the correct answer is right. If there's a helpful analytical strategy (like logical elimination or careful reasoning), mention it. Keep it concise—2-3 sentences for an advanced 6th grader. Make it intellectually engaging and encouraging!`;

            fetch('https://script.google.com/macros/s/AKfycbx-nDlBMubq1I-u9M-fpkhwJbfROgyOXjgXjXmJtQuAPUjXvSn0vzO9yDQ0GJmUHSTPrA/exec', {
                method: 'POST',
                body: JSON.stringify({
                    action: 'chat',
                    student: 'Jacob',
                    message: prompt
                })
            })
            .then(r => r.json())
            .then(data => {
                msgDiv.innerHTML = escapeHtml(data.response || data.message || 'Unable to retrieve explanation.');
                btn.disabled = false;
            })
            .catch(err => {
                msgDiv.innerHTML = 'Unable to contact Gary at this moment. Please try again later.';
                btn.disabled = false;
            });
        }

        function dismissTutor(index) {
            document.getElementById(`tutor${index}`).classList.remove('active');
            document.getElementById(`askBtn${index}`).focus();
        }

        function scrollToCompletion() {
            const completion = document.querySelector('.completion-message');
            if (completion) {
                completion.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function goToDashboard() {
            window.location.href = 'Jacob_Dashboard.html';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
