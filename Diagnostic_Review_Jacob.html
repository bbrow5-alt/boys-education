<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Scholar's Review — with Gary</title>
    <style>
        :root {
            --bg: #1a1510;
            --card-bg: #231e17;
            --accent: #c9a84c;
            --secondary: #8b7355;
            --text: #e8dcc8;
            --text-muted: #a9957d;
            --correct: #4ade80;
            --incorrect: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: Georgia, serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            color: var(--bg);
        }

        .header p {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.95;
            color: var(--bg);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            gap: 10px;
            background-color: rgba(201, 168, 76, 0.1);
            border-bottom: 1px solid var(--accent);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: Georgia, serif;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(201, 168, 76, 0.3);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover {
            background-color: var(--accent);
            color: var(--bg);
        }

        .main {
            flex: 1;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
        }

        .no-results-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .no-results h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .no-results p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .summary {
            background-color: var(--card-bg);
            border-left: 5px solid var(--accent);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 8px;
            text-align: center;
        }

        .summary h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .score-item {
            text-align: center;
        }

        .score-number {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent);
        }

        .score-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-text {
            color: var(--text);
            margin-top: 20px;
            font-size: 16px;
        }

        .review-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .review-item {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(201, 168, 76, 0.2);
        }

        .review-header {
            background-color: rgba(201, 168, 76, 0.15);
            padding: 20px;
            border-bottom: 1px solid var(--accent);
        }

        .review-question-num {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .review-question-text {
            font-size: 18px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.5;
        }

        .passage {
            background-color: rgba(201, 168, 76, 0.08);
            padding: 15px;
            margin: 15px 0;
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
        }

        .passage-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 14px;
        }

        .review-content {
            padding: 20px;
        }

        .answer-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .answer-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .answer-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .answer-text {
            font-size: 14px;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .answer-incorrect {
            background-color: rgba(248, 113, 113, 0.15);
            border: 2px solid var(--incorrect);
            color: var(--text);
        }

        .answer-correct {
            background-color: rgba(74, 222, 128, 0.15);
            border: 2px solid var(--correct);
            color: var(--text);
        }

        .tutor-button {
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
        }

        .tutor-button:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
        }

        .tutor-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tutor-response {
            background-color: rgba(201, 168, 76, 0.1);
            border-left: 4px solid var(--accent);
            padding: 20px;
            margin-top: 15px;
            border-radius: 6px;
            display: none;
        }

        .tutor-response.active {
            display: block;
        }

        .tutor-label {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .tutor-message {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 15px;
        }

        .tutor-loading {
            color: var(--accent);
            font-style: italic;
        }

        .got-it-btn {
            background-color: var(--secondary);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
        }

        .got-it-btn:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
        }

        .completion-message {
            background-color: rgba(201, 168, 76, 0.15);
            border: 2px solid var(--accent);
            padding: 40px 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 50px;
        }

        .completion-message h3 {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .completion-message p {
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
        }

        /* === PERCENTILE REPORT STYLES === */
        .percentile-section {
            margin-top: 40px;
            text-align: center;
        }

        .percentile-trigger-btn {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: var(--bg);
            border: none;
            padding: 18px 40px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.4);
            letter-spacing: 0.5px;
        }

        .percentile-trigger-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(201, 168, 76, 0.5);
        }

        .percentile-card {
            background-color: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 35px 25px;
            margin-top: 20px;
            text-align: center;
            animation: fadeSlideIn 0.6s ease-out;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .percentile-card h3 {
            font-size: 22px;
            color: var(--accent);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .percentile-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
        }

        .percentile-number {
            font-size: 42px;
            font-weight: bold;
            color: var(--bg);
            line-height: 1;
        }

        .percentile-suffix {
            font-size: 16px;
            color: var(--bg);
            opacity: 0.9;
        }

        .percentile-meaning {
            color: var(--text);
            font-size: 16px;
            margin: 15px 0 30px;
            line-height: 1.5;
        }

        .section-breakdown {
            text-align: left;
            margin: 25px 0;
        }

        .section-breakdown h4 {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .section-bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .section-bar-name {
            min-width: 130px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: right;
        }

        .bar-track {
            flex: 1;
            height: 24px;
            background-color: rgba(201, 168, 76, 0.1);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--bg);
            transition: width 0.8s ease-out;
            min-width: 40px;
        }

        .bar-fill.high { background: linear-gradient(90deg, var(--correct), #2dd870); }
        .bar-fill.medium { background: linear-gradient(90deg, var(--accent), var(--secondary)); }
        .bar-fill.low { background: linear-gradient(90deg, #f59e0b, var(--incorrect)); }

        .strength-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .badge-strength {
            background-color: rgba(74, 222, 128, 0.2);
            color: var(--correct);
            border: 1px solid var(--correct);
        }

        .badge-growth {
            background-color: rgba(248, 113, 113, 0.15);
            color: var(--incorrect);
            border: 1px solid rgba(248, 113, 113, 0.4);
        }

        .percentile-tutor-summary {
            background-color: rgba(201, 168, 76, 0.1);
            border-left: 4px solid var(--accent);
            padding: 20px;
            margin-top: 25px;
            border-radius: 6px;
            text-align: left;
        }

        .percentile-tutor-summary .tutor-label {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .percentile-tutor-summary .tutor-message {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .main {
                padding: 15px;
            }

            .summary {
                padding: 20px;
            }

            .score {
                gap: 30px;
            }

            .score-number {
                font-size: 28px;
            }

            .review-question-text {
                font-size: 16px;
            }

            .answer-text {
                font-size: 13px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .section-bar-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .section-bar-name {
                text-align: left;
                min-width: auto;
            }

            .percentile-circle {
                width: 120px;
                height: 120px;
            }

            .percentile-number {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>The Scholar's Review — with Gary</h1>
        <p>Let's learn from your diagnostic results</p>
    </div>

    <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="goToDashboard()">&#8592; Back to Dashboard</button>
        <button class="btn btn-secondary" id="skipBtn" onclick="scrollToCompletion()" style="display:none;">Skip to Finish</button>
    </div>

    <div class="main">
        <div id="content"></div>
    </div>

    <script>
        // Exact SECTIONS array from Diagnostic_Test_Jacob_March2026.html
        const SECTIONS = [
          {
            name: "Verbal Skills",
            description: "Synonyms, antonyms, analogies, and verbal logic. Choose the best answer for each question.",
            timeLimit: 480,
            questions: [
              { text: "Which word means the same as <strong>diligent</strong>?", options: ["Lazy","Hardworking","Confused","Angry"], correct: 1 },
              { text: "Which word is the OPPOSITE of <strong>abundant</strong>?", options: ["Plentiful","Scarce","Generous","Wealthy"], correct: 1 },
              { text: "<strong>Architect</strong> is to <strong>building</strong> as <strong>author</strong> is to:", options: ["Library","Reading","Book","Pen"], correct: 2 },
              { text: "Which word means the same as <strong>persevere</strong>?", options: ["Quit","Continue","Hesitate","Forget"], correct: 1 },
              { text: "Which word is the OPPOSITE of <strong>conceal</strong>?", options: ["Hide","Bury","Reveal","Protect"], correct: 2 },
              { text: "<strong>Hammer</strong> is to <strong>nail</strong> as <strong>screwdriver</strong> is to:", options: ["Wrench","Bolt","Screw","Drill"], correct: 2 },
              { text: "Which word means the same as <strong>ancient</strong>?", options: ["Modern","Recent","Old","Young"], correct: 2 },
              { text: "Choose the word that does NOT belong with the others:", options: ["Triangle","Square","Circle","Cube"], correct: 3 },
              { text: "<strong>Microscope</strong> is to <strong>small</strong> as <strong>telescope</strong> is to:", options: ["Near","Far","Bright","Dark"], correct: 1 },
              { text: "If all roses are flowers, and some flowers fade quickly, which MUST be true?", options: ["All roses fade quickly","No roses fade quickly","Some roses may fade quickly","Roses never fade"], correct: 2 }
            ]
          },
          {
            name: "Quantitative Skills",
            description: "Number patterns, sequences, and quantitative reasoning. No calculator allowed.",
            timeLimit: 480,
            questions: [
              { text: "What number comes next in the pattern? <strong>2, 6, 18, 54, ___</strong>", options: ["108","162","72","216"], correct: 1 },
              { text: "What number comes next? <strong>100, 91, 82, 73, ___</strong>", options: ["66","65","64","63"], correct: 2 },
              { text: "If 3 \u00d7 N = 45, what is N + 7?", options: ["15","22","52","20"], correct: 1 },
              { text: "What number comes next? <strong>1, 1, 2, 3, 5, 8, ___</strong>", options: ["11","12","13","15"], correct: 2 },
              { text: "Which is greater: <strong>3/4</strong> or <strong>5/7</strong>?", options: ["3/4","5/7","They are equal","Cannot determine"], correct: 0 },
              { text: "If a rectangle has a perimeter of 30 cm and a length of 10 cm, what is its width?", options: ["5 cm","10 cm","15 cm","20 cm"], correct: 0 },
              { text: "What number comes next? <strong>3, 7, 15, 31, ___</strong>", options: ["47","55","63","59"], correct: 2 },
              { text: "25% of 80 is the same as:", options: ["40","20","15","10"], correct: 1 },
              { text: "If you flip a fair coin twice, how many possible outcomes are there?", options: ["2","3","4","6"], correct: 2 },
              { text: "A number multiplied by itself gives 144. What is the number?", options: ["11","12","13","14"], correct: 1 }
            ]
          },
          {
            name: "Reading Comprehension",
            description: "Read each passage carefully, then answer the questions about it.",
            timeLimit: 600,
            questions: [
              { text: '<div class="passage">The ancient Romans were master builders. They invented concrete, which allowed them to construct enormous structures like the Colosseum and the Pantheon. The dome of the Pantheon, built around 125 AD, remained the largest unreinforced concrete dome in the world for over 1,300 years. Roman roads were so well-built that some are still used today, nearly 2,000 years later.</div>According to the passage, what made Roman construction possible?', options: ["Iron tools","The invention of concrete","Slave labor","Advanced mathematics"], correct: 1 },
              { text: '<div class="passage">The ancient Romans were master builders. They invented concrete, which allowed them to construct enormous structures like the Colosseum and the Pantheon. The dome of the Pantheon, built around 125 AD, remained the largest unreinforced concrete dome in the world for over 1,300 years. Roman roads were so well-built that some are still used today, nearly 2,000 years later.</div>How long did the Pantheon\'s dome hold its record?', options: ["125 years","500 years","Over 1,300 years","2,000 years"], correct: 2 },
              { text: '<div class="passage">The ancient Romans were master builders. They invented concrete, which allowed them to construct enormous structures like the Colosseum and the Pantheon. The dome of the Pantheon, built around 125 AD, remained the largest unreinforced concrete dome in the world for over 1,300 years. Roman roads were so well-built that some are still used today, nearly 2,000 years later.</div>The main idea of this passage is that:', options: ["Romans built the Colosseum","Roman engineering achievements were remarkably durable","Concrete was invented in 125 AD","Roman roads are the best in history"], correct: 1 },
              { text: '<div class="passage">Unlike most animals that either hunt or are hunted, the octopus has developed an extraordinary set of defenses. It can change its color and texture in milliseconds to blend with rocks, coral, or sand. If spotted, it can release a cloud of dark ink to confuse predators while it jets away using a built-in water propulsion system. Some species can even detach an arm as a decoy \u2014 and regrow it later.</div>What is the author\'s purpose in this passage?', options: ["To argue that octopuses are dangerous","To explain how octopuses defend themselves","To compare octopuses to other sea creatures","To describe the ocean floor"], correct: 1 },
              { text: '<div class="passage">Unlike most animals that either hunt or are hunted, the octopus has developed an extraordinary set of defenses. It can change its color and texture in milliseconds to blend with rocks, coral, or sand. If spotted, it can release a cloud of dark ink to confuse predators while it jets away using a built-in water propulsion system. Some species can even detach an arm as a decoy \u2014 and regrow it later.</div>The word "decoy" in the passage most likely means:', options: ["A weapon","A distraction","A shield","A reward"], correct: 1 },
              { text: '<div class="passage">Maria had been staring at the same math problem for twenty minutes. The numbers seemed to swim on the page. She closed her eyes, took three deep breaths, and pictured her grandmother\'s advice: \u201cWhen a wall blocks your path, don\'t push harder \u2014 step back and look for the door.\u201d Maria opened her eyes, reread the problem from the beginning, and suddenly saw what she had been missing. The answer had been there all along.</div>What can you infer about Maria\'s grandmother?', options: ["She was a math teacher","She believed in finding creative solutions","She did not like school","She lived far away"], correct: 1 },
              { text: '<div class="passage">Maria had been staring at the same math problem for twenty minutes. The numbers seemed to swim on the page. She closed her eyes, took three deep breaths, and pictured her grandmother\'s advice: \u201cWhen a wall blocks your path, don\'t push harder \u2014 step back and look for the door.\u201d Maria opened her eyes, reread the problem from the beginning, and suddenly saw what she had been missing. The answer had been there all along.</div>The phrase "the numbers seemed to swim on the page" is an example of:', options: ["A simile","A metaphor","Figurative language showing frustration","A fact about numbers"], correct: 2 },
              { text: '<div class="passage">In 2023, scientists discovered that trees in a forest communicate through an underground network of fungi, sometimes called the \u201cWood Wide Web.\u201d Through this network, older trees can send nutrients to younger, shaded trees that cannot get enough sunlight. Some trees even send chemical warning signals when pests attack, allowing neighboring trees to activate their own defenses before the insects arrive.</div>According to the passage, how do older trees help younger trees?', options: ["By blocking the wind","By sending nutrients through fungi","By growing taller to provide shade","By producing extra oxygen"], correct: 1 },
              { text: '<div class="passage">In 2023, scientists discovered that trees in a forest communicate through an underground network of fungi, sometimes called the \u201cWood Wide Web.\u201d Through this network, older trees can send nutrients to younger, shaded trees that cannot get enough sunlight. Some trees even send chemical warning signals when pests attack, allowing neighboring trees to activate their own defenses before the insects arrive.</div>Why is the network called the "Wood Wide Web"?', options: ["Because it is made of wood","Because it connects trees like the internet connects computers","Because scientists discovered it online","Because the fungi look like spider webs"], correct: 1 },
              { text: '<div class="passage">In 2023, scientists discovered that trees in a forest communicate through an underground network of fungi, sometimes called the \u201cWood Wide Web.\u201d Through this network, older trees can send nutrients to younger, shaded trees that cannot get enough sunlight. Some trees even send chemical warning signals when pests attack, allowing neighboring trees to activate their own defenses before the insects arrive.</div>Based on the passage, which statement best describes forests?', options: ["Trees compete for resources","Forests are communities where trees cooperate","Most trees cannot survive without sunlight","Fungi are harmful to trees"], correct: 1 }
            ]
          },
          {
            name: "Mathematics",
            description: "Math concepts and problem-solving. Work through each problem carefully. No calculator allowed.",
            timeLimit: 600,
            questions: [
              { text: "What is 3/8 + 1/4?", options: ["4/12","1/2","5/8","4/8"], correct: 2 },
              { text: "A shirt originally costs $40. It is on sale for 25% off. What is the sale price?", options: ["$30","$35","$25","$15"], correct: 0 },
              { text: "What is the area of a triangle with a base of 12 cm and a height of 8 cm?", options: ["96 cm\u00b2","48 cm\u00b2","20 cm\u00b2","80 cm\u00b2"], correct: 1 },
              { text: "Solve for x: 2x + 7 = 19", options: ["x = 5","x = 6","x = 7","x = 13"], correct: 1 },
              { text: "What is 0.75 as a fraction in simplest form?", options: ["75/100","7/5","3/4","7/10"], correct: 2 },
              { text: "A bag contains 3 red marbles, 5 blue marbles, and 2 green marbles. What is the probability of drawing a blue marble?", options: ["1/2","5/10","3/10","2/10"], correct: 0 },
              { text: "What is the value of 2\u00b3 \u00d7 3?", options: ["18","24","12","36"], correct: 1 },
              { text: "If a car travels 180 miles in 3 hours, what is its average speed?", options: ["50 mph","55 mph","60 mph","65 mph"], correct: 2 },
              { text: "The ratio of boys to girls in a class is 3:5. If there are 24 students total, how many boys are there?", options: ["8","9","10","12"], correct: 1 },
              { text: "What is the volume of a rectangular box that is 4 cm long, 3 cm wide, and 5 cm tall?", options: ["12 cm\u00b3","35 cm\u00b3","60 cm\u00b3","120 cm\u00b3"], correct: 2 }
            ]
          },
          {
            name: "Language & Writing",
            description: "Grammar, punctuation, usage, and a short writing prompt.",
            timeLimit: 600,
            questions: [
              { text: "Which sentence uses commas correctly?", options: ["The dog, ran across the yard.","After the game, we went out for pizza.","My favorite colors are, red blue and green.","She said hello, to everyone."], correct: 1 },
              { text: 'Choose the sentence with correct subject-verb agreement:', options: ["The group of students are ready.","The team play their best every game.","Each of the boys has his own book.","Neither of the girls were late."], correct: 2 },
              { text: 'Which sentence is written correctly?', options: ["Me and him went to the store.","Him and I went to the store.","He and I went to the store.","He and me went to the store."], correct: 2 },
              { text: 'Choose the correct word: "The weather will _____ our plans."', options: ["affect","effect","affeckt","efect"], correct: 0 },
              { text: 'Which word is spelled correctly?', options: ["Seperate","Definately","Necessary","Occassion"], correct: 2 },
              { text: 'Which sentence uses an apostrophe correctly?', options: ["The dog wagged it's tail.","Its going to rain tomorrow.","The children's playground was crowded.","The teacher's are in a meeting."], correct: 2 },
              { text: 'Choose the best way to combine these sentences: "The building was tall. The building was made of glass."', options: ["The building was tall and it was made of glass.","The tall, glass building stood there.","The tall building was made of glass.","The building was tall, made of glass it was."], correct: 2 },
              { text: 'Which sentence contains a simile?', options: ["The thunder roared across the sky.","Her smile was as bright as the sun.","The wind whispered through the trees.","Time flies when you are having fun."], correct: 1 },
              {
                text: '<strong>Writing Prompt:</strong> In 3\u20135 sentences, describe a building or place you find interesting and explain why it fascinates you.',
                type: "writing"
              }
            ]
          }
        ];

        const STORAGE_KEY = 'diagnosticResults_targeted_diagnostic_20260306';
        const PENDING_KEY = 'pending_assessment_comprehensive_diagnostic_20260301';
        const PENDING_KEY_ALT = 'pending_assessment_March2026';
        const tutorName = 'Gary';
        const studentName = 'Jacob';

        // Check for latest diagnostic review data (Week 5+)
        function loadLatestReview() {
            try {
                const raw = localStorage.getItem('jacob_diagnostic_latest_review');
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (!data || !data.answers || !data.questions || !data.sections) return null;

                // Rebuild SECTIONS from the saved test data
                SECTIONS.length = 0;
                data.sections.forEach(function(sec) {
                    var questions = [];
                    for (var i = sec.range[0]; i <= sec.range[1]; i++) {
                        var q = data.questions[i];
                        if (q) {
                            var passageText = '';
                            if (q.passage && data.passages && data.passages[q.passage]) {
                                passageText = '<div class="passage"><strong>' + data.passages[q.passage].title + '</strong><br>' + data.passages[q.passage].text.split('\n\n').slice(0,1).join('') + '...</div>';
                            }
                            questions.push({
                                text: (passageText ? passageText : '') + q.text,
                                options: q.opts,
                                correct: q.cor
                            });
                        }
                    }
                    SECTIONS.push({ name: sec.name, questions: questions });
                });

                // Convert flat answers array to section-based format
                var sectionAnswers = {};
                data.sections.forEach(function(sec, si) {
                    sectionAnswers[si] = {};
                    for (var i = sec.range[0]; i <= sec.range[1]; i++) {
                        var localIdx = i - sec.range[0];
                        if (data.answers[i] !== null && data.answers[i] !== undefined) {
                            sectionAnswers[si][localIdx] = data.answers[i];
                        }
                    }
                });

                return { answers: sectionAnswers, totalQuestions: data.questions.length };
            } catch(e) { console.warn('Latest review load failed:', e); return null; }
        }

        async function loadResultsFromAPI() {
            try {
                // Primary: read from Assessments sheet via getAssessments
                const res = await fetch('https://script.google.com/macros/s/AKfycby6BhujnfDQt9oguJFSemP-5iBhyUkWr9e8m2iDgs3MkRsB2AKm5tvoc53gajmd6DCVjQ/exec?action=getAssessments&student=Jacob');
                if (res.ok) {
                    const assessments = await res.json();
                    // Find the diagnostic assessment (Sections is already parsed by API)
                    const diag = Array.isArray(assessments) && assessments.find(s =>
                        (s.TestID || '').toLowerCase().includes('diagnostic') ||
                        (s.TestID || '').toLowerCase().includes('march2026')
                    );
                    if (diag && diag.Sections && Array.isArray(diag.Sections)) {
                        const answers = {};
                        let totalQuestions = 0;
                        diag.Sections.forEach((sec, si) => {
                            answers[si] = {};
                            if (sec.details) {
                                sec.details.forEach((d, qi) => {
                                    totalQuestions++;
                                    if (d.chosen !== null && d.chosen !== undefined) {
                                        const q = SECTIONS[si]?.questions[qi];
                                        if (q && q.options) {
                                            const idx = q.options.indexOf(d.chosen);
                                            if (idx >= 0) answers[si][qi] = idx;
                                        }
                                    }
                                });
                            }
                        });
                        return { answers, totalQuestions };
                    }
                }
            } catch(e) { console.warn('API fallback failed:', e); }
            return null;
        }

        function loadResults() {
            // Try primary key first (diagnosticResults format)
            let results = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (results && results.answers) return results;

            // Fallback: try pending_assessment format (flat keys like "0-2")
            const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || 'null');
            if (pending && pending.sections) {
                const answers = {};
                let totalQuestions = 0;
                pending.sections.forEach((sec, si) => {
                    answers[si] = {};
                    if (sec.details) {
                        sec.details.forEach((d, qi) => {
                            totalQuestions++;
                            if (d.chosen !== null) {
                                const q = SECTIONS[si]?.questions[qi];
                                if (q) {
                                    const idx = q.options.indexOf(d.chosen);
                                    if (idx >= 0) answers[si][qi] = idx;
                                }
                            }
                        });
                    }
                });
                return { answers, totalQuestions };
            }

            // Try alternative pending key
            const pendingAlt = JSON.parse(localStorage.getItem(PENDING_KEY_ALT) || 'null');
            if (pendingAlt && pendingAlt.sections) {
                const answers = {};
                let totalQuestions = 0;
                pendingAlt.sections.forEach((sec, si) => {
                    answers[si] = {};
                    if (sec.details) {
                        sec.details.forEach((d, qi) => {
                            totalQuestions++;
                            if (d.chosen !== null) {
                                const q = SECTIONS[si]?.questions[qi];
                                if (q) {
                                    const idx = q.options.indexOf(d.chosen);
                                    if (idx >= 0) answers[si][qi] = idx;
                                }
                            }
                        });
                    }
                });
                return { answers, totalQuestions };
            }

            // Last resort: try flat-key format
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('diagnostic_answers_jacob')) {
                    try {
                        const flatAnswers = JSON.parse(localStorage.getItem(key));
                        return convertFlatAnswers(flatAnswers);
                    } catch(e) {}
                }
            }

            return null;
        }

        function convertFlatAnswers(flatAnswers) {
            const answers = {};
            let totalQuestions = 0;
            SECTIONS.forEach((sec, si) => {
                answers[si] = {};
                sec.questions.forEach((q, qi) => {
                    totalQuestions++;
                    const key = `${si}-${qi}`;
                    if (flatAnswers[key] !== undefined) {
                        answers[si][qi] = flatAnswers[key];
                    }
                });
            });
            return { answers, totalQuestions };
        }

        async function init() {
            let results = loadLatestReview(); // try Week 5+ format first
            if (!results) {
                results = loadResults(); // try legacy localStorage
            }
            if (!results) {
                results = await loadResultsFromAPI(); // try API
            }
            if (!results) {
                showNoResults();
                return;
            }

            const { answers, totalQuestions } = results;
            const incorrectQuestions = findIncorrectQuestions(answers);
            const sectionScores = getSectionScores(answers);
            const correctCount = totalQuestions - incorrectQuestions.length;

            // Store globally for percentile functions
            globalSectionScores = sectionScores;
            globalCorrectCount = correctCount;
            globalTotalCount = totalQuestions;

            if (incorrectQuestions.length === 0) {
                showPerfectScore(sectionScores, totalQuestions);
                return;
            }

            renderReview(incorrectQuestions, totalQuestions, sectionScores);
        }

        function findIncorrectQuestions(answers) {
            const incorrect = [];
            let questionIndex = 0;

            SECTIONS.forEach((section, sectionIndex) => {
                section.questions.forEach((question, qIndex) => {
                    if (question.type !== 'writing') {
                        const studentAnswer = answers[sectionIndex]?.[qIndex];
                        if (studentAnswer !== question.correct) {
                            incorrect.push({
                                globalIndex: questionIndex,
                                sectionIndex,
                                questionIndex: qIndex,
                                section: section.name,
                                question,
                                studentAnswer,
                                correctAnswer: question.correct
                            });
                        }
                    }
                    questionIndex++;
                });
            });

            return incorrect;
        }

        function showNoResults() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">\u26a0\ufe0f</div>
                    <h2>No diagnostic results found</h2>
                    <p>Make sure you're using the same device you took the test on.</p>
                    <button class="btn btn-primary" onclick="goToDashboard()">Return to Dashboard</button>
                </div>
            `;
        }

        function showPerfectScore(sectionScores, totalQuestions) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="summary">
                    <h2>Perfect Score!</h2>
                    <p class="summary-text">You got every question right on your diagnostic test. Outstanding work, scholar!</p>
                </div>
                <div class="percentile-section" id="percentileSection">
                    <button class="percentile-trigger-btn" id="percentileTriggerBtn"
                        onclick="showPercentileReport(${totalQuestions || 48}, ${totalQuestions || 48}, globalSectionScores)">
                        See How I Did
                    </button>
                </div>
                <div class="completion-message">
                    <h3>\ud83c\udfc6 A Triumph Worthy of the Forum!</h3>
                    <p>You've demonstrated mastery across every subject. The scholars of Rome would be proud!</p>
                    <button class="btn btn-primary" onclick="goToDashboard()" style="margin-top:20px;">Return to the Forum</button>
                </div>
            `;
        }

        function renderReview(incorrectQuestions, totalQuestions, sectionScores) {
            const correct = totalQuestions - incorrectQuestions.length;
            const content = document.getElementById('content');

            let html = `
                <div class="summary">
                    <h2>You got ${correct} out of ${totalQuestions} correct!</h2>
                    <div class="score">
                        <div class="score-item">
                            <div class="score-number">${correct}/${totalQuestions}</div>
                            <div class="score-label">Correct</div>
                        </div>
                        <div class="score-item">
                            <div class="score-number">${incorrectQuestions.length}</div>
                            <div class="score-label">To Review</div>
                        </div>
                    </div>
                    <p class="summary-text">Let's review the questions you missed together. Every great scholar learns from their mistakes.</p>
                </div>

                <div class="review-container">
            `;

            incorrectQuestions.forEach((item, idx) => {
                const q = item.question;

                html += `
                    <div class="review-item">
                        <div class="review-header">
                            <div class="review-question-num">Question ${item.globalIndex + 1} \u2022 ${item.section}</div>
                            <div class="review-question-text">${q.text}</div>
                        </div>
                        <div class="review-content">
                `;

                html += `
                    <div class="answer-row">
                        <div class="answer-label">You chose:</div>
                        <div class="answer-text answer-incorrect">
                            ${escapeHtml(q.options[item.studentAnswer])}
                        </div>
                    </div>
                    <div class="answer-row">
                        <div class="answer-label">Correct answer:</div>
                        <div class="answer-text answer-correct">
                            ${escapeHtml(q.options[item.correctAnswer])}
                        </div>
                    </div>
                `;

                html += `
                    <button class="tutor-button" onclick="askTutor(${idx}, '${escapeHtml(q.text).replace(/'/g, "\\'")}', '${escapeHtml(q.options[item.studentAnswer]).replace(/'/g, "\\'")}', '${escapeHtml(q.options[item.correctAnswer]).replace(/'/g, "\\'")}')" id="askBtn${idx}">
                        Ask ${tutorName}
                    </button>
                    <div class="tutor-response" id="tutor${idx}">
                        <div class="tutor-label">\ud83d\udcac ${tutorName}'s Explanation</div>
                        <div class="tutor-message" id="tutorMsg${idx}"></div>
                        <button class="got-it-btn" onclick="dismissTutor(${idx})">Got it!</button>
                    </div>
                `;

                html += `</div></div>`;
            });

            html += `</div>`;

            // Add percentile report section
            html += `
                <div class="percentile-section" id="percentileSection">
                    <p style="color:var(--text-muted); margin-bottom:15px; font-size:14px;">Done reviewing? See how you compare.</p>
                    <button class="percentile-trigger-btn" id="percentileTriggerBtn"
                        onclick="showPercentileReport(${correct}, ${totalQuestions}, globalSectionScores)">
                        See How I Did
                    </button>
                </div>
            `;

            content.innerHTML = html;
            document.getElementById('skipBtn').style.display = 'block';
        }

        function askTutor(index, question, wrongAnswer, correctAnswer) {
            const tutorDiv = document.getElementById(`tutor${index}`);
            const msgDiv = document.getElementById(`tutorMsg${index}`);
            const btn = document.getElementById(`askBtn${index}`);

            msgDiv.innerHTML = '<span class="tutor-loading">Gary is thinking...</span>';
            tutorDiv.classList.add('active');
            btn.disabled = true;

            const prompt = `You are Gary, a wise and encouraging AI tutor with a Roman/classical scholarly style for a 6th grader named Jacob. Jacob answered this question incorrectly on a diagnostic test:

Question: "${question}"
Jacob chose: "${wrongAnswer}"
Correct answer: "${correctAnswer}"

Explain in a friendly, scholarly tone why the correct answer is right. If there's a helpful test-taking strategy (like process of elimination or checking your work), mention it. Keep it concise\u20142-3 sentences for a 6th grader. Make it engaging and encouraging!`;

            fetch('https://script.google.com/macros/s/AKfycby6BhujnfDQt9oguJFSemP-5iBhyUkWr9e8m2iDgs3MkRsB2AKm5tvoc53gajmd6DCVjQ/exec', {
                method: 'POST',
                body: JSON.stringify({
                    action: 'chat',
                    student: 'Jacob',
                    message: prompt
                })
            })
            .then(r => r.json())
            .then(data => {
                msgDiv.innerHTML = escapeHtml(data.response || data.message || 'Unable to get explanation.');
                btn.disabled = false;
            })
            .catch(err => {
                msgDiv.innerHTML = 'Unable to reach Gary right now. Please try again later.';
                btn.disabled = false;
            });
        }

        function dismissTutor(index) {
            document.getElementById(`tutor${index}`).classList.remove('active');
            document.getElementById(`askBtn${index}`).focus();
        }

        // === PERCENTILE CALCULATION ===
        function normalCDF(x) {
            // Abramowitz & Stegun approximation
            const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
            const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
            const sign = x < 0 ? -1 : 1;
            x = Math.abs(x) / Math.sqrt(2);
            const t = 1.0 / (1.0 + p * x);
            const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
            return 0.5 * (1.0 + sign * y);
        }

        function calculatePercentile(pctCorrect) {
            // Normal distribution: mean=65%, SD=15% (typical grade-level diagnostic)
            const mean = 65, sd = 15;
            const z = (pctCorrect - mean) / sd;
            let percentile = Math.round(normalCDF(z) * 100);
            // Clamp to reasonable range
            return Math.max(5, Math.min(99, percentile));
        }

        function getSectionScores(answers) {
            return SECTIONS.map((section, si) => {
                let correct = 0, total = 0;
                section.questions.forEach((q, qi) => {
                    if (q.type !== 'writing') {
                        total++;
                        if (answers[si]?.[qi] === q.correct) correct++;
                    }
                });
                const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
                return { name: section.name, correct, total, pct };
            });
        }

        function getOrdinalSuffix(n) {
            const s = ['th','st','nd','rd'];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function showPercentileReport(correct, total, sectionScores) {
            const btn = document.getElementById('percentileTriggerBtn');
            if (btn) btn.style.display = 'none';

            const pctCorrect = Math.round((correct / total) * 100);
            const percentile = calculatePercentile(pctCorrect);
            const ordinal = getOrdinalSuffix(percentile);

            // Find strongest and weakest sections
            const sorted = [...sectionScores].sort((a, b) => b.pct - a.pct);
            const strongest = sorted[0];
            const weakest = sorted[sorted.length - 1];

            let barsHtml = '';
            sectionScores.forEach(sec => {
                const level = sec.pct >= 80 ? 'high' : sec.pct >= 50 ? 'medium' : 'low';
                barsHtml += `
                    <div class="section-bar-row">
                        <span class="section-bar-name">${sec.name}</span>
                        <div class="bar-track">
                            <div class="bar-fill ${level}" style="width:${Math.max(sec.pct, 8)}%">${sec.correct}/${sec.total}</div>
                        </div>
                    </div>`;
            });

            const cardHtml = `
                <div class="percentile-card" id="percentileCard">
                    <h3>Your Performance Report</h3>
                    <div class="percentile-circle">
                        <div class="percentile-number">${ordinal}</div>
                        <div class="percentile-suffix">percentile</div>
                    </div>
                    <p class="percentile-meaning">
                        I estimate your performance is better than about <strong>${percentile}%</strong> of students at your grade level.
                    </p>
                    <div class="strength-badges">
                        <span class="badge badge-strength">Strongest: ${strongest.name} (${strongest.pct}%)</span>
                        ${weakest.name !== strongest.name ? `<span class="badge badge-growth">Keep building: ${weakest.name} (${weakest.pct}%)</span>` : ''}
                    </div>
                    <div class="section-breakdown">
                        <h4>Section Breakdown</h4>
                        ${barsHtml}
                    </div>
                    <div class="percentile-tutor-summary">
                        <div class="tutor-label">${tutorName}'s Assessment</div>
                        <div class="tutor-message" id="percentileTutorMsg">
                            <span class="tutor-loading">${tutorName} is preparing your performance report...</span>
                        </div>
                    </div>
                </div>`;

            document.getElementById('percentileSection').innerHTML = cardHtml;

            // Request AI tutor summary
            requestTutorSummary(correct, total, pctCorrect, percentile, sectionScores);
        }

        function requestTutorSummary(correct, total, pctCorrect, percentile, sectionScores) {
            const sorted = [...sectionScores].sort((a, b) => b.pct - a.pct);
            const sectionSummary = sectionScores.map(s => `${s.name}: ${s.correct}/${s.total} (${s.pct}%)`).join(', ');

            const prompt = `You are ${tutorName}, a wise and encouraging AI tutor with a Roman/classical scholarly style for a 6th grader named ${studentName}. ${studentName} just completed reviewing a diagnostic test. Here are the results:

Overall: ${correct}/${total} correct (${pctCorrect}%)
Estimated percentile: ${percentile}th (compared to grade-level peers)
Section scores: ${sectionSummary}
Strongest section: ${sorted[0].name} (${sorted[0].pct}%)
Area for growth: ${sorted[sorted.length-1].name} (${sorted[sorted.length-1].pct}%)

Give ${studentName} a personalized 3-4 sentence performance summary in your scholarly, encouraging tone. Start by telling them their estimated percentile ("I estimate your performance is better than about ${percentile}% of your peers"). Praise their strongest area specifically. Give one concrete, encouraging suggestion for their weakest area. End with motivation. Keep it warm and age-appropriate for a 6th grader.`;

            fetch('https://script.google.com/macros/s/AKfycby6BhujnfDQt9oguJFSemP-5iBhyUkWr9e8m2iDgs3MkRsB2AKm5tvoc53gajmd6DCVjQ/exec', {
                method: 'POST',
                body: JSON.stringify({
                    action: 'chat',
                    student: studentName,
                    message: prompt
                })
            })
            .then(r => r.json())
            .then(data => {
                const msg = data.response || data.message || `Great work completing your review, ${studentName}! Your strongest area was ${sectionScores.sort((a,b) => b.pct - a.pct)[0].name}. Keep studying and you'll keep climbing!`;
                document.getElementById('percentileTutorMsg').innerHTML = escapeHtml(msg);
            })
            .catch(err => {
                const sorted = [...sectionScores].sort((a, b) => b.pct - a.pct);
                document.getElementById('percentileTutorMsg').innerHTML =
                    `Great work completing your review, ${studentName}! I estimate your performance is better than about ${percentile}% of your peers. Your strongest area was ${sorted[0].name} — impressive work there! Keep building your skills in ${sorted[sorted.length-1].name} and you'll climb even higher. Every great scholar started exactly where you are now.`;
            });
        }

        // Store section scores globally for access by percentile functions
        let globalSectionScores = [];
        let globalCorrectCount = 0;
        let globalTotalCount = 0;

        function scrollToCompletion() {
            const completion = document.querySelector('.completion-message') || document.querySelector('.percentile-section');
            if (completion) {
                completion.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function goToDashboard() {
            window.location.href = 'Jacob_Dashboard.html';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        window.addEventListener('load', init);
    </script>
