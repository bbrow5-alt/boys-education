        // Question Generators
        function generateReadingQuestions() {
            return [
                {
                    type: "multiple",
                    passage: "The Coral Reef Ecosystem\n\nCoral reefs are among Earth's most productive ecosystems, supporting about 25% of all marine fish species despite covering less than 1% of the ocean floor. Corals form a symbiotic relationship with tiny algae called zooxanthellae, which live inside the coral's cells and provide nutrients through photosynthesis. In return, the coral protects the algae and provides the carbon dioxide they need. This partnership is so tightly bound that corals cannot survive without their algal partners.",
                    question: "Based on the passage, what is the PRIMARY relationship between coral and zooxanthellae?",
                    options: [
                        "The coral feeds on the algae to survive",
                        "Both organisms benefit from living together",
                        "The zooxanthellae harm the coral's health",
                        "The coral controls the algae population"
                    ],
                    correct: 1,
                    skill: "symbiosis/main idea"
                },
                {
                    type: "multiple",
                    question: "What does 'symbiotic' most likely mean in this passage?",
                    options: [
                        "Living in separate areas",
                        "Fighting for survival",
                        "Living together in a mutually helpful way",
                        "Competing for food sources"
                    ],
                    correct: 2,
                    skill: "vocabulary in context"
                },
                {
                    type: "multiple",
                    passage: "Food Webs in the Deep Sea\n\nDeep ocean creatures live in complete darkness, where no sunlight reaches. Without sunlight, plants cannot grow, so many deep-sea animals rely on 'marine snow'—bits of dead organisms and waste that drift down from the ocean above. Some creatures like giant squid hunt for prey in the darkness, using bioluminescence (light produced by living things) to attract or confuse other animals. The deep sea may seem barren, but it's actually teeming with strange and fascinating life.",
                    question: "Why do most deep-sea organisms depend on marine snow?",
                    options: [
                        "Because it provides food from upper ocean layers",
                        "Because it is produced by bioluminescent creatures",
                        "Because it is made of salt and minerals",
                        "Because it is the only thing they can digest"
                    ],
                    correct: 0,
                    skill: "cause and effect"
                },
                {
                    type: "multiple",
                    question: "What is the author's PRIMARY purpose in writing this passage?",
                    options: [
                        "To explain why deep-sea creatures are dangerous",
                        "To describe how life adapts in the deep ocean",
                        "To argue that we should fear the ocean",
                        "To prove that deep seas are completely empty"
                    ],
                    correct: 1,
                    skill: "author's purpose"
                },
                {
                    type: "multiple",
                    passage: "The Invention of the Printing Press\n\nBefore Johannes Gutenberg invented the printing press around 1440, books were copied by hand, making them expensive and rare. The printing press allowed text to be reproduced quickly and cheaply, which meant more people could learn to read and access information. This invention helped spread new ideas during the Renaissance and contributed to major scientific and social changes. The printing press is considered one of history's most important inventions because it democratized knowledge.",

                    options: [
                        "It made all books the same size",
                        "It made information more widely available to more people",
                        "It prevented people from learning to read",
                        "It was invented by multiple people at once"
                    ],
                    correct: 1,
                    skill: "inference"
                },
                {
                    type: "multiple",
                    question: "What does 'democratized' mean as used in this passage?",
                    options: [
                        "Made something belong only to certain people",
                        "Made something available to more people",
                        "Made something illegal",
                        "Made something more difficult"
                    ],
                    correct: 1,
                    skill: "vocabulary in context"
                },
                {
                    type: "multiple",
                    passage: "Rainforest Biodiversity\n\nThe Amazon Rainforest covers an area of 5.5 million square kilometers and is home to approximately 10% of all species on Earth. Scientists estimate that a single hectare of rainforest can contain more than 300 tree species, while a temperate forest typically contains only 30 species. This incredible diversity exists because the rainforest's warm, wet climate creates many different habitats for organisms. Many rainforest plants and animals have not yet been discovered or studied by scientists.",
                    question: "According to the passage, why is rainforest biodiversity so high?",
                    options: [
                        "Because scientists have discovered all the species",
                        "Because the warm, wet climate creates diverse habitats",
                        "Because there are more animals than plants",
                        "Because humans have protected it from development"
                    ],
                    correct: 1,
                    skill: "cause and effect"
                },
                {
                    type: "multiple",
                    question: "Which statement is BEST supported by evidence in the passage?",
                    options: [
                        "Temperate forests have more species than rainforests",
                        "The Amazon covers less land than any other forest",
                        "Rainforests contain far more tree species per area than temperate forests",
                        "Scientists have studied all rainforest organisms"
                    ],
                    correct: 2,
                    skill: "evidence-based reasoning"
                },
                {
                    type: "multiple",
                    passage: "The Wright Brothers' First Flight\n\nOn December 17, 1903, Orville Wright piloted the first powered airplane flight at Kitty Hawk, North Carolina. The flight lasted only 12 seconds and traveled about 120 feet—less distance than today's commercial airplane wingspan. This brief achievement was the result of years of scientific study, experimentation, and persistence. Despite early criticism and failed attempts, the Wright brothers refused to give up, and their breakthrough changed transportation forever.",
                    question: "What can we infer about the Wright brothers from this passage?",
                    options: [
                        "They were lucky to succeed on their first try",
                        "They gave up easily when facing challenges",
                        "They were determined and committed to their goal",
                        "They did not study science carefully"

                    correct: 2,
                    skill: "inference/character"

                        "To explain why the Wright brothers failed",
                        "To put the achievement's small distance into perspective",
                        "To prove that modern planes are better designed"
                    ],
                    correct: 2,
                    skill: "author's purpose/context"
                }
            ];
        }

                    type: "multiple",
                    question: "A chess tournament has 8 players. Each player plays every other player once. How many total games are played?",
                    options: ["16", "28", "32", "56"],
                    correct: 1,
                    skill: "combinatorial thinking"
                },
                {
                    type: "multiple",
                    question: "What comes next? O, T, T, F, F, S, S, E, N, ___",
                    options: ["T", "D", "V", "X"],
                    correct: 2,
                    skill: "pattern recognition (first letters of number names)"
                }
            ];
        }

        function generateLanguageQuestions() {
            return [
                {
                    type: "multiple",
                    question: "Which sentence is grammatically correct?",
                    options: [
                        "She don't like apples.",
                        "He go to school yesterday.",
                        "They were playing in the park.",
                        "We has three cats."
                    ],
                    correct: 2,
                    skill: "grammar/verb tense"
                },
                {
                    type: "multiple",
                    question: "What is the best way to combine these sentences? 'The cat was orange. The cat had stripes.'",
                    options: [
                        "The cat was orange and had stripes.",
                        "The cat was orange, the cat had stripes.",
                        "The cat was orange; it was striped.",
                        "The orange cat and stripes were there."
                    ],
                    correct: 0,
                    skill: "sentence combining"
                },
                {
                    type: "multiple",
                    question: "Which word is spelled correctly?",
                    options: ["occured", "occured", "occurred", "occurrd"],
                    correct: 2,
                    skill: "spelling"
                },
                {
                    type: "multiple",
                    question: "What does 'eloquent' mean?",
                    options: [
                        "Very quiet and shy",
                        "Fluent, persuasive, and expressive in speech or writing",
                        "Elegant in appearance",
                        "Easily forgotten"
                    ],
                    correct: 1,
                    skill: "vocabulary"
                },
                {
                    type: "multiple",
                    question: "Which sentence uses a metaphor?",
                    options: [
                        "The sky is as blue as the ocean.",
                        "Time is money.",
                        "The dog ran like the wind.",
                        "The flowers swayed gently."
                    ],
                    correct: 1,
                    skill: "figurative language"
                },
                {
                    type: "multiple",
                    question: "Identify the error: 'Each of the students have submitted their homework on time.'",
                    options: [
                        "'Each' should be capitalized",
                        "'have' should be 'has'",
                        "'their' should be 'his or her'",
                        "There is no error"
                    ],
                    correct: 1,
                    skill: "subject-verb agreement"
                },
                {
                    type: "multiple",
                    question: "Which sentence demonstrates correct use of a semicolon?",
                    options: [
                        "She was tired; she decided to rest.",
                        "He went to the store; and bought milk.",
                        "The cat slept; on the couch.",
                        "I like reading; because it is fun."
                    ],
                    correct: 0,
                    skill: "punctuation"
                },
                {
                    type: "multiple",
                    question: "What does the phrase 'get your act together' mean?",
                    options: [
                        "Prepare for a theatrical performance",
                        "Organize your paperwork",
                        "Get yourself organized and focused",
                        "Join a theater group"
                    ],
                    correct: 2,
                    skill: "idioms/figurative language"
                },
                {
                    type: "multiple",
                    question: "Choose the best vocabulary: 'The lawyer presented a _____ argument that convinced the jury.'",
                    options: ["bad", "weak", "powerful", "tried"],
                    correct: 2,
                    skill: "word choice/vocabulary"
                },
                {
                    type: "writing",
                    question: "Writing Prompt: Imagine you're an architect designing a museum dedicated to Roman architecture and history. Describe the building you would create. What features would showcase Roman design? How would you incorporate history into the design? (Write at least 4-5 sentences.)",
                    skill: "extended writing"
                }
            ];
        }

        function generateVerbalQuestions() {
            return [
                {
                    type: "multiple",
                    question: "Which word means the OPPOSITE of 'abundant'?",
                    options: ["plentiful", "scarce", "generous", "lavish"],
                    correct: 1,
                    skill: "antonyms"
                },
                {
                    type: "multiple",
                    question: "Which word means the SAME as 'tenacious'?",
                    options: ["lazy", "persistent", "careless", "fearful"],
                    correct: 1,
                    skill: "synonyms"
                },
                {
                    type: "multiple",
                    question: "Dog is to bark as cat is to ___",
                    options: ["meow", "jump", "fur", "house"],
                    correct: 0,
                    skill: "analogies"
                },
                {
                    type: "multiple",
                    question: "Which word is an example of a 'vehicle'?",
                    options: ["chair", "bicycle", "building", "tree"],
                    correct: 1,
                    skill: "categorization"
                },
                {
                    type: "multiple",
                    question: "Hot is to temperature as speed is to ___",
                    options: ["fast", "velocity", "direction", "movement"],
                    correct: 1,
                    skill: "analogies"
                },
                {
                    type: "multiple",
                    question: "Which word means to 'follow or pursue'?",
                    options: ["chase", "place", "ace", "lace"],
                    correct: 0,
                    skill: "vocabulary"
                },
                {
                    type: "multiple",
                    question: "Honest is to dishonest as _____ is to quiet.",
                    options: ["shy", "silent", "loud", "soft"],
                    correct: 2,
                    skill: "analogies"
                },
                {
                    type: "multiple",
                    question: "Which word does NOT belong in this group? Elephant, lion, tiger, goldfish",
                    options: ["elephant", "lion", "tiger", "goldfish"],
                    correct: 3,
                    skill: "categorization"
                },
                {
                    type: "multiple",
                    question: "Choose the word that best completes: 'Her _____ personality made her popular with classmates.'",
                    options: ["morose", "gregarious", "timid", "eccentric"],
                    correct: 1,
                    skill: "vocabulary in context"
                },
                {
                    type: "multiple",
                    question: "Book is to author as painting is to ___",
                    options: ["canvas", "artist", "gallery", "frame"],
                    correct: 1,
                    skill: "analogies"
                }
            ];
        }

        // Screen Rendering
        function showWelcome() {
            const html = `
                <div class="welcome-container">
                    <div class="logo">⊙ ⓄⒽⓂⒶ</div>
                    <h1 class="welcome-title">${CONFIG.testLabel}</h1>
                    <p class="welcome-subtitle">For Jacob Brown, Grade ${CONFIG.grade}</p>

                    <div class="welcome-message">
                        <strong>This is NOT a test you pass or fail.</strong> It just helps your dad understand where to focus your learning. We want to see how you think and what you understand. Do your best, be honest, and don't worry about perfect answers.
                    </div>

                    <div class="instructions-box">
                        <h3>Here's How It Works</h3>
                        <ul>
                            <li><strong>5 sections:</strong> Reading, Math, Reasoning, Language, and Vocabulary</li>
                            <li><strong>Time limits:</strong> Each section has a timer. You don't have to rush.</li>
                            <li><strong>Mobile friendly:</strong> Works great on your iPhone. Use portrait mode.</li>
                            <li><strong>Your answers:</strong> All results are saved and sent to your dad.</li>
                            <li><strong>Take breaks:</strong> You can take a few seconds between sections if you need.</li>
                        </ul>
                    </div>

                    <p style="color: #d4af6a; margin-bottom: 20px; font-size: 15px;">Ready? Let's start with Reading Comprehension.</p>
                </div>
            `;
            renderScreen('welcome', html);
        }

        function showSectionIntro(sectionIndex) {
            const section = SECTIONS[sectionIndex];
            const totalQuestions = section.questions.length;
            const timeMinutes = Math.floor(section.timeLimit / 60);

            const html = `
                <div class="section-intro">
                    <h2 class="section-intro-title">${section.name}</h2>
                    <p class="section-intro-description">${section.description}</p>

                    <div class="section-intro-details">
                        <strong>Questions:</strong> ${totalQuestions}<br>
                        <strong>Time Limit:</strong> ${timeMinutes} minutes<br>
                        <strong>Section ${sectionIndex + 1} of ${SECTIONS.length}</strong>
                    </div>

                    <p style="color: #d4af6a; font-size: 15px;">Take your time. Think carefully about each question. You've got this.</p>
                </div>
            `;
            renderScreen('sectionIntro', html);
        }

        function showQuestion(sectionIndex, questionIndex) {
            const section = SECTIONS[sectionIndex];
            const question = section.questions[questionIndex];
            const globalIndex = getTotalQuestionsBefore(sectionIndex) + questionIndex + 1;
            const totalQuestions = getTotalQuestions();

            let html = `
                <div class="question-container">
                    <div class="question-number">Question ${globalIndex} of ${totalQuestions}</div>
            `;

            if (question.passage) {
                html += `<div class="passage">${question.passage}</div>`;
            }

            html += `<div class="question-text">${question.question}</div>`;

            if (question.type === "multiple") {
                html += `<div class="options">`;
                question.options.forEach((option, idx) => {
                    const responseKey = `${sectionIndex}-${questionIndex}`;
                    const isChecked = sectionResponses[responseKey] === idx;
                    html += `
                        <label class="option ${isChecked ? 'selected' : ''}">
                            <input type="radio" name="question-${sectionIndex}-${questionIndex}" value="${idx}"
                                ${isChecked ? 'checked' : ''}
                                onchange="selectOption(${sectionIndex}, ${questionIndex}, ${idx})">
                            ${option}
                        </label>
                    `;
                });
                html += `</div>`;
            } else if (question.type === "writing") {
                const responseKey = `${sectionIndex}-${questionIndex}`;
                const currentText = sectionResponses[responseKey] || '';
                html += `
                    <div class="writing-prompt">This is your chance to show what you're thinking. Write in complete sentences and express your ideas clearly.</div>
                    <textarea class="writing-input" placeholder="Your answer here..." onchange="recordWritingAnswer(${sectionIndex}, ${questionIndex}, this.value)">${currentText}</textarea>
                `;
            }

            html += `</div>`;
            renderScreen('question', html);
        }

        function showSectionBreak(sectionIndex) {
            const completedSectionName = SECTIONS[sectionIndex].name;
            const nextSectionIndex = sectionIndex + 1;
            const isLastSection = nextSectionIndex >= SECTIONS.length;
            const completedCount = sectionIndex + 1;
            const totalSections = SECTIONS.length;

            let html = `
                <div class="section-break">
                    <h2 class="section-break-title">Great Work!</h2>
                    <p class="section-break-message">You've completed <strong>${completedSectionName}</strong>.</p>

                    <div class="progress-summary">
                        <strong>Progress:</strong> ${completedCount} of ${totalSections} sections completed<br>
                        <strong>Questions Answered:</strong> ${getTotalQuestionsBefore(nextSectionIndex)} of ${getTotalQuestions()}
                    </div>

                    <p style="color: #d4af6a; font-size: 15px;">
                        ${isLastSection
                            ? "You're almost done! One more section to go."
                            : `Next up: <strong>${SECTIONS[nextSectionIndex].name}</strong>`}
                    </p>
                </div>
            `;
            renderScreen('sectionBreak', html);
        }

        function showCompletion() {
            const effortScore = Math.round((getTotalQuestionsAnswered() / getTotalQuestions()) * 100);
            const html = `
                <div class="completion-container">
                    <div class="completion-icon">★</div>
                    <h2 class="completion-title">Assessment Complete!</h2>

                    <div class="completion-message">
                        Great work finishing the assessment! Your effort and focus are what matter most. Your dad will review the results to plan your learning path.
                    </div>

                    <div class="effort-score">${effortScore}%</div>
                    <p class="effort-label">Effort Score (Questions Completed)</p>

                    <div class="next-steps">
                        <h3>What Happens Next</h3>
                        <p>Your results are being securely sent to your learning dashboard. Your dad and tutors will use this to:</p>
                        <p style="margin-top: 10px;">
                            ✓ Identify your strengths<br>
                            ✓ Find areas to focus on<br>
                            ✓ Create a personalized learning plan<br>
                            ✓ Track your progress over time
                        </p>
                    </div>

                    <p style="color: #c9a84c; font-size: 16px; margin-top: 30px; font-weight: bold;">Keep up the great work!</p>
                </div>
            `;
            renderScreen('completion', html);
        }

        // Utility Functions
        function renderScreen(screenType, html) {
            currentScreen = screenType;
            document.getElementById('content').innerHTML = html;
            updateNavigation();
            updateProgressBar();
            updateTimerBar();
        }

        function getTotalQuestions() {
            return SECTIONS.reduce((sum, section) => sum + section.questions.length, 0);
        }

        function getTotalQuestionsBefore(sectionIndex) {
            let total = 0;
            for (let i = 0; i < sectionIndex; i++) {
                total += SECTIONS[i].questions.length;
            }
            return total;
        }

        function getTotalQuestionsAnswered() {
            return Object.keys(responses).length;
        }

        function updateProgressBar() {
            const totalQuestions = getTotalQuestions();
            let answered = 0;

            if (currentScreen === 'question') {
                answered = getTotalQuestionsAnswered();
            } else if (currentScreen === 'completion') {
                answered = totalQuestions;
            }

            const percentage = (answered / totalQuestions) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function updateTimerBar() {
            if (currentScreen === 'question') {
                const section = SECTIONS[currentSection];
                document.getElementById('sectionName').textContent = section.name;
                startSectionTimer(currentSection);
            } else {
                document.getElementById('sectionName').textContent = 'Starting…';
                document.getElementById('timer').textContent = '—';
                if (timerInterval) clearInterval(timerInterval);
            }
        }

        function startSectionTimer(sectionIndex) {
            if (timerInterval) clearInterval(timerInterval);

            const section = SECTIONS[sectionIndex];
            if (!sectionTimers[sectionIndex]) {
                sectionTimers[sectionIndex] = section.timeLimit;
            }

            timerInterval = setInterval(() => {
                sectionTimers[sectionIndex]--;

                const minutes = Math.floor(sectionTimers[sectionIndex] / 60);
                const seconds = sectionTimers[sectionIndex] % 60;
                const timerDisplay = `${minutes}:${seconds.toString().padStart(2, '0')}`;

                const timerEl = document.getElementById('timer');
                timerEl.textContent = timerDisplay;

                if (sectionTimers[sectionIndex] <= 60) {
                    timerEl.classList.add('warning');
                } else {
                    timerEl.classList.remove('warning');
                }

                if (sectionTimers[sectionIndex] <= 0) {
                    clearInterval(timerInterval);
                    // Auto-advance to next question
                    setTimeout(nextQuestion, 500);
                }
            }, 1000);
        }

        function updateNavigation() {
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');

            backBtn.disabled = currentScreen === 'welcome';

            if (currentScreen === 'welcome') {
                nextBtn.textContent = 'Start →';
            } else if (currentScreen === 'completion') {
                nextBtn.textContent = 'Done';
            } else {
                nextBtn.textContent = 'Next →';
            }
        }

        function selectOption(sectionIndex, questionIndex, optionIndex) {
            sectionResponses[`${sectionIndex}-${questionIndex}`] = optionIndex;
            responses[`${sectionIndex}-${questionIndex}`] = optionIndex;

            // Highlight selected option
            const options = document.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                if (idx === optionIndex) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        function recordWritingAnswer(sectionIndex, questionIndex, text) {
            sectionResponses[`${sectionIndex}-${questionIndex}`] = text;
            responses[`${sectionIndex}-${questionIndex}`] = text;
        }

        function nextQuestion() {
            if (currentScreen === 'welcome') {
                currentSection = 0;
                currentQuestion = 0;
                sectionResponses = {};
                showSectionIntro(0);
            } else if (currentScreen === 'sectionIntro') {
                showQuestion(currentSection, 0);
            } else if (currentScreen === 'question') {
                const section = SECTIONS[currentSection];
                if (currentQuestion < section.questions.length - 1) {
                    currentQuestion++;
                    showQuestion(currentSection, currentQuestion);
                } else {
                    // End of section
                    const isLastSection = currentSection === SECTIONS.length - 1;
                    if (isLastSection) {
                        submitTest();
                    } else {
                        showSectionBreak(currentSection);
                    }
                }
            } else if (currentScreen === 'sectionBreak') {
                currentSection++;
                currentQuestion = 0;
                sectionResponses = {};
                showSectionIntro(currentSection);
            } else if (currentScreen === 'completion') {
                // Test is complete
                location.reload();
            }
        }

        function previousQuestion() {
            if (currentScreen === 'question') {
                if (currentQuestion > 0) {
                    currentQuestion--;
                    showQuestion(currentSection, currentQuestion);
                } else {
                    currentScreen = 'sectionIntro';
                    showSectionIntro(currentSection);
                }
            } else if (currentScreen === 'sectionBreak') {
                const section = SECTIONS[currentSection];
                currentQuestion = section.questions.length - 1;
                showQuestion(currentSection, currentQuestion);
            } else if (currentScreen === 'sectionIntro') {
                if (currentSection > 0) {
                    currentSection--;
                    const section = SECTIONS[currentSection];
                    currentQuestion = section.questions.length - 1;
                    showQuestion(currentSection, currentQuestion);
                } else {
                    showWelcome();
                }
            }
        }

        function submitTest() {
            const testData = {
                student: CONFIG.student,
                grade: CONFIG.grade,
                testId: CONFIG.testId,
                timestamp: new Date().toISOString(),
                responses: responses,
                totalQuestions: getTotalQuestions(),
                questionsAnswered: getTotalQuestionsAnswered(),
                effortScore: Math.round((getTotalQuestionsAnswered() / getTotalQuestions()) * 100),
                diagnosticPoints: 15
            };

            // Save locally
            localStorage.setItem(`diagnostic_${CONFIG.testId}`, JSON.stringify(testData));

            // POST to Apps Script
            fetch(CONFIG.webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(testData)
            }).catch(err => {
                console.log('Network error (expected in no-cors mode):', err);
                // This is expected. The no-cors mode prevents reading the response,
                // but the request is still sent.
            });

            // Show completion screen
            showCompletion();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            showWelcome();
        });
    </script>
</body>
</html>
