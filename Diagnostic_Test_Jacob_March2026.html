<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diagnostic Test - Jacob Brown</title>
    <style>
        :root {
            --primary-gold: #c9a84c;
            --dark-brown: #1a1510;
            --light-brown: #2a2420;
            --accent-gold: #e8d4a0;
            --text-light: #f5f1e8;
            --text-muted: #b8a98a;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: Georgia, serif;
            background-color: var(--dark-brown);
            color: var(--text-light);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Progress and Timer Bars */
        .progress-bar {
            background: linear-gradient(90deg, var(--primary-gold), var(--accent-gold));
            height: 8px;
            width: 0%;
            transition: width 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .status-bar {
            background-color: var(--light-brown);
            border-bottom: 2px solid var(--primary-gold);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text-light);
            margin-top: 8px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            padding-top: 16px;
            z-index: 90;
        }

        .status-section {
            font-weight: bold;
            color: var(--primary-gold);
            letter-spacing: 0.5px;
        }

        .status-timer {
            font-variant-numeric: tabular-nums;
            color: var(--text-light);
        }

        .status-timer.warning {
            color: var(--warning);
        }

        .status-timer.critical {
            color: var(--error);
            font-weight: bold;
        }

        /* Main Content Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 60px;
            margin-bottom: 70px;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 40px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Welcome Screen */
        .welcome-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .welcome-content {
            max-width: 500px;
        }

        .welcome-title {
            font-size: 48px;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: normal;
            letter-spacing: 2px;
        }

        .welcome-subtitle {
            font-size: 28px;
            color: var(--accent-gold);
            margin-bottom: 30px;
        }

        .welcome-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        /* Section Intro Screen */
        .section-intro {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .section-intro-content {
            max-width: 500px;
        }

        .section-number {
            font-size: 64px;
            color: var(--primary-gold);
            margin-bottom: 20px;
            font-weight: normal;
            letter-spacing: 3px;
        }

        .section-title {
            font-size: 32px;
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-weight: normal;
        }

        .section-instructions {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .section-time {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Question Screen */
        .question-screen {
            justify-content: flex-start;
        }

        .question-content {
            flex: 1;
        }

        .question-number {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 18px;
            color: var(--text-light);
            margin-bottom: 24px;
            line-height: 1.6;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--light-brown);
        }

        .passage {
            background-color: var(--light-brown);
            padding: 20px;
            border-left: 4px solid var(--primary-gold);
            margin-bottom: 24px;
            border-radius: 4px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-light);
        }

        .passage-title {
            font-size: 14px;
            color: var(--primary-gold);
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            padding: 16px;
            background-color: var(--light-brown);
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-light);
        }

        .option:hover {
            background-color: #3a3430;
            border-color: var(--primary-gold);
        }

        .option.selected {
            background-color: var(--light-brown);
            border-color: var(--primary-gold);
            box-shadow: inset 0 0 0 2px var(--primary-gold);
        }

        .option-label {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            background-color: var(--primary-gold);
            color: var(--dark-brown);
            border-radius: 50%;
            margin-right: 12px;
            font-weight: bold;
        }

        .option.selected .option-label {
            background-color: var(--accent-gold);
            font-weight: bold;
        }

        /* Writing Input */
        .writing-input-container {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--light-brown);
            color: var(--text-light);
            border: 2px solid var(--primary-gold);
            border-radius: 4px;
            font-family: Georgia, serif;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            min-height: 120px;
        }

        textarea:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--light-brown);
            border-top: 2px solid var(--primary-gold);
            padding: 16px;
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            z-index: 90;
        }

        .nav-button {
            flex: 1;
            padding: 14px 20px;
            background-color: var(--primary-gold);
            color: var(--dark-brown);
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: Georgia, serif;
            letter-spacing: 1px;
        }

        .nav-button:hover {
            background-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
        }

        .nav-button:active {
            transform: translateY(0);
        }

        .nav-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .question-counter {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 0 10px;
            white-space: nowrap;
        }

        /* Completion Screen */
        .completion-screen {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .completion-content {
            max-width: 500px;
        }

        .completion-title {
            font-size: 36px;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .completion-subtitle {
            font-size: 24px;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        .score-display {
            background-color: var(--light-brown);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid var(--primary-gold);
        }

        .score-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 48px;
            color: var(--primary-gold);
            font-weight: normal;
            margin-bottom: 20px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--light-brown);
        }

        .stat {
            flex: 1;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            color: var(--accent-gold);
        }

        .completion-message {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-button {
            padding: 14px 20px;
            background-color: var(--primary-gold);
            color: var(--dark-brown);
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: Georgia, serif;
            letter-spacing: 1px;
        }

        .action-button:hover {
            background-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
        }

        /* Scrollable content adjustments */
        .screen::-webkit-scrollbar {
            width: 6px;
        }

        .screen::-webkit-scrollbar-track {
            background: var(--light-brown);
        }

        .screen::-webkit-scrollbar-thumb {
            background: var(--primary-gold);
            border-radius: 3px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .welcome-title {
                font-size: 36px;
            }

            .welcome-subtitle {
                font-size: 22px;
            }

            .section-number {
                font-size: 48px;
            }

            .section-title {
                font-size: 24px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 15px;
                padding: 14px;
            }

            .nav-bar {
                padding: 12px;
                gap: 8px;
            }

            .nav-button {
                padding: 12px 16px;
                font-size: 14px;
            }

            .completion-title {
                font-size: 28px;
            }

            .score-value {
                font-size: 36px;
            }
        }
    </style>
</head>

                            "36",
                            "42"
                        ],
                        correct: 2
                    },
                    {
                        text: "If you fold a piece of paper in half, you get 2 layers. If you fold it in half again, you get 4 layers. How many layers after 5 folds?",
                        options: [
                            "10",
                            "16",
                            "32",
                            "64"
                        ],
                        correct: 2
                    },
                    {
                        text: "What is the next number in this sequence? 100, 50, 25, 12.5, _",
                        options: [
                            "6.25",
                            "6.5",
                            "8",
                            "10"
                        ],
                        correct: 0
                    },
                    {
                        text: "A train leaves the station traveling east at 60 mph. Another train leaves traveling west at 80 mph. How far apart are they after 2 hours?",
                        options: [
                            "140 miles",
                            "280 miles",
                            "120 miles",
                            "160 miles"
                        ],
                        correct: 1
                    }
                ]
            },
            {
                id: "language",
                title: "Language & Writing",
                instructions: "Answer grammar and writing questions. The final question is a writing prompt.",
                timeLimit: 10 * 60,
                questionCount: 10,
                questions: [
                    {
                        text: "Which sentence is grammatically correct?",
                        options: [
                            "Either Sarah or the boys are going to the store.",
                            "Either Sarah or the boys is going to the store.",
                            "The boys or Sarah are going to the store.",
                            "Both A and C are correct"
                        ],
                        correct: 3
                    },
                    {
                        text: "Which sentence uses the correct pronoun?",
                        options: [
                            "Her and me are best friends.",
                            "She and I are best friends.",
                            "Her and I are best friends.",
                            "Me and her are best friends."
                        ],
                        correct: 1
                    },
                    {
                        text: "Where should a comma be placed in this sentence? 'We went to the park and played basketball and had ice cream.'",
                        options: [
                            "After 'park'",
                            "After 'basketball'",
                            "Both A and B are correct places for commas",
                            "No comma is needed"
                        ],
                        correct: 2
                    },
                    {
                        text: "Which sentence best combines these two ideas using proper punctuation? 'The dog was tired. It fell asleep on the couch.'",
                        options: [
                            "The dog was tired, it fell asleep on the couch.",
                            "The dog was tired, so it fell asleep on the couch.",
                            "The dog was tired. So it fell asleep on the couch.",
                            "The dog was tired and it fell asleep on the couch."
                        ],
                        correct: 1
                    },
                    {
                        text: "Which phrase is an example of a simile?",
                        options: [
                            "The night was dark.",
                            "The night was as dark as coal.",
                            "Darkness covered the night.",
                            "The night was dark and quiet."
                        ],
                        correct: 1
                    },
                    {
                        text: "Which word is spelled correctly in this group?",
                        options: [
                            "ocassion",
                            "occasion",
                            "ocasion",
                            "occassion"
                        ],
                        correct: 1
                    },
                    {
                        text: "Which sentence uses apostrophes correctly?",
                        options: [
                            "The girl's jumped over the rope.",
                            "The girls' jump over the rope.",
                            "The girls jumped over the rope's.",
                            "The girl's jump over the rope."
                        ],
                        correct: 1
                    },
                    {
                        text: "Which sentence uses 'affect' or 'effect' correctly?",
                        options: [
                            "The rain will effect our outdoor plans.",
                            "The rain will affect our outdoor plans.",
                            "The rain's affect was to cancel our plans.",
                            "The rain affected the plans' effect."
                        ],
                        correct: 1
                    },
                    {
                        text: "Which answer best describes the main idea of a well-organized paragraph?",
                        options: [
                            "It contains many sentences with different ideas.",
                            "All sentences support one central idea or topic sentence.",
                            "It is written in the past tense.",
                            "It has the longest sentences in an essay."
                        ],
                        correct: 1
                    },
                    {
                        text: "Describe a structure or building that fascinates you and explain what makes it remarkable. Write 3–5 sentences.",
                        type: "writing"
                    }
                ]
            },
            {
                id: "verbal",
                title: "Verbal Reasoning",
                instructions: "Work with synonyms, antonyms, analogies, and vocabulary.",
                timeLimit: 8 * 60,
                questionCount: 10,
                questions: [
                    {
                        text: "Which word is a synonym for 'diligent'?",
                        options: [
                            "Lazy",
                            "Hardworking",
                            "Forgetful",
                            "Careless"
                        ],
                        correct: 1
                    },
                    {
                        text: "Which word is an antonym for 'abundant'?",
                        options: [
                            "Plentiful",
                            "Scarce",
                            "Generous",
                            "Rich"
                        ],
                        correct: 1
                    },
                    {
                        text: "Complete the analogy: Happy is to sad as bright is to ___",
                        options: [
                            "Dark",
                            "Shiny",
                            "Light",
                            "Happy"
                        ],
                        correct: 0
                    },
                    {
                        text: "Which of these words does NOT belong in the group?",
                        options: [
                            "Pencil",
                            "Pen",
                            "Crayon",
                            "Desk"
                        ],
                        correct: 3
                    },
                    {
                        text: "What does the word 'persevere' mean?",
                        options: [
                            "To give up easily",
                            "To keep trying despite difficulties",
                            "To move quickly",
                            "To forget something"
                        ],
                        correct: 1
                    },
                    {
                        text: "Which word is a synonym for 'conceal'?",
                        options: [
                            "Reveal",
                            "Hide",
                            "Display",
                            "Show"
                        ],
                        correct: 1
                    },
                    {
                        text: "Complete the analogy: Book is to author as painting is to ___",
                        options: [
                            "Canvas",
                            "Paint",
                            "Artist",
                            "Frame"
                        ],
                        correct: 2
                    },
                    {
                        text: "Which word means 'very old or from a long time ago'?",
                        options: [
                            "Modern",
                            "Ancient",
                            "Recent",
                            "New"
                        ],
                        correct: 1
                    },
                    {
                        text: "What is the relationship between these words: Dog, Wolf, Animal",
                        options: [
                            "Dog and wolf are the same thing",
                            "Dog and wolf are both types of animals",
                            "Animal is a type of dog",
                            "Wolf is less important than a dog"
                        ],
                        correct: 1
                    },
                    {
                        text: "Which word is a synonym for 'triumph'?",
                        options: [
                            "Failure",
                            "Loss",
                            "Victory",
                            "Defeat"
                        ],
                        correct: 2
                    }
                ]
            }
        ];

        // Application State
        let state = {
            currentScreen: 'welcome',
            currentSection: 0,
            currentQuestion: 0,
            answers: {},
            writingAnswers: {},
            startTime: null,
            sectionStartTimes: {},
            sectionTimeLimits: {},
            timerInterval: null
        };

        // Initialize
        function init() {
            loadState();
            renderScreen();
            setupEventListeners();
            startTimer();
        }

        function setupEventListeners() {
            document.getElementById('backBtn').addEventListener('click', handleBack);
            document.getElementById('nextBtn').addEventListener('click', handleNext);
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('diagnosticTestState');
                if (saved) {
                    state = { ...state, ...JSON.parse(saved) };
                }
            } catch (e) {
                console.log('No saved state');
            }
        }

        function saveState() {
            try {
                localStorage.setItem('diagnosticTestState', JSON.stringify(state));
            } catch (e) {
                console.log('Could not save state');
            }
        }

        function renderScreen() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            if (state.currentScreen === 'welcome') {
                renderWelcomeScreen(container);
            } else if (state.currentScreen === 'sectionIntro') {
                renderSectionIntroScreen(container);
            } else if (state.currentScreen === 'question') {
                renderQuestionScreen(container);
            } else if (state.currentScreen === 'completion') {
                renderCompletionScreen(container);
            }

            updateStatusBar();
            updateProgressBar();
            updateNavButtons();
            updateQuestionCounter();
        }

        function renderWelcomeScreen(container) {
            const screen = document.createElement('div');
            screen.className = 'screen welcome-screen active';
            screen.innerHTML = `
                <div class="welcome-content">
                    <div class="welcome-title">Welcome</div>
                    <div class="welcome-subtitle">Welcome, ${CONFIG.student}</div>
                    <div class="welcome-text">
                        <p>You're about to take the ${CONFIG.testLabel}.</p>
                        <p style="margin-top: 20px;">This assessment is designed to help us understand your strengths and areas where you might benefit from additional support. <strong>This is not a test you pass or fail.</strong> There is no time pressure—work carefully and do your best on each question.</p>
                        <p style="margin-top: 20px;">The test has 5 sections with questions about reading, math, reasoning, language, and vocabulary. You'll have time limits for each section, but these are just guidelines to help you pace yourself.</p>
                        <p style="margin-top: 20px;">Ready to begin?</p>
                    </div>
                </div>
            `;
            container.appendChild(screen);
        }

        function renderSectionIntroScreen(container) {
            const section = SECTIONS[state.currentSection];
            const screen = document.createElement('div');
            screen.className = 'screen section-intro active';
            screen.innerHTML = `
                <div class="section-intro-content">
                    <div class="section-number">0${state.currentSection + 1}</div>
                    <div class="section-title">${section.title}</div>
                    <div class="section-instructions">${section.instructions}</div>
                    <div class="section-time">Time Limit: ${Math.floor(section.timeLimit / 60)} minutes</div>
                </div>
            `;
            container.appendChild(screen);
        }

        function renderQuestionScreen(container) {
            const section = SECTIONS[state.currentSection];
            const question = section.questions[state.currentQuestion];
            const screen = document.createElement('div');
            screen.className = 'screen question-screen active';

            let questionContent = `
                <div class="question-content">
                    <div class="question-number">Question ${state.currentQuestion + 1} of ${section.questionCount}</div>
            `;

            // Handle passages
            if (question.passage) {
                questionContent += `
                    <div class="passage">
                        <div class="passage-title">${question.passage.title}</div>
                        <div>${question.passage.text}</div>
                    </div>
                `;
            } else if (question.passageIndex !== undefined) {
                const passage = section.questions.find((q, i) => q.passage && i <= state.currentQuestion);
                if (passage) {
                    questionContent += `
                        <div class="passage">
                            <div class="passage-title">${passage.passage.title}</div>
                            <div>${passage.passage.text}</div>
                        </div>
                    `;
                }
            }

            questionContent += `
                    <div class="question-text">${question.text}</div>
            `;

            // Handle different question types
            if (question.type === 'writing') {
                const writingAnswer = state.writingAnswers[`${state.currentSection}_${state.currentQuestion}`] || '';
                questionContent += `
                    <div class="writing-input-container">
                        <textarea
                            id="writingInput"
                            placeholder="Type your response here..."
                        >${writingAnswer}</textarea>
                    </div>
                `;
            } else {
                const selectedOption = state.answers[`${state.currentSection}_${state.currentQuestion}`];
                questionContent += `
                    <div class="options">
                        ${question.options.map((option, idx) => `
                            <div class="option ${selectedOption === idx ? 'selected' : ''}" data-option="${idx}">
                                <span class="option-label">${String.fromCharCode(65 + idx)}</span>
                                ${option}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            questionContent += `
                </div>
            `;

            screen.innerHTML = questionContent;
            container.appendChild(screen);

            // Add event listeners for options
            if (question.type !== 'writing') {
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', handleOptionSelect);
                });
            } else {
                document.getElementById('writingInput').addEventListener('change', handleWritingInput);
            }
        }

        function renderCompletionScreen(container) {
            const totalQuestions = SECTIONS.reduce((sum, section) => sum + section.questionCount, 0);
            const answeredQuestions = Object.keys(state.answers).length + Object.keys(state.writingAnswers).length;
            const totalSeconds = Math.round((Date.now() - state.startTime) / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const effortScore = Math.round((answeredQuestions / totalQuestions) * 100);

            const screen = document.createElement('div');
            screen.className = 'screen completion-screen active';
            screen.innerHTML = `
                <div class="completion-content">
                    <div class="completion-title">Excellent Work!</div>
                    <div class="completion-subtitle">Test Complete</div>
                    <div class="score-display">
                        <div class="score-label">Effort Score</div>
                        <div class="score-value">${effortScore}%</div>
                        <div class="stats-row">
                            <div class="stat">
                                <div class="stat-label">Questions Answered</div>
                                <div class="stat-value">${answeredQuestions}/${totalQuestions}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Time Taken</div>
                                <div class="stat-value">${minutes}m ${seconds}s</div>
                            </div>
                        </div>
                    </div>
                    <div class="completion-message">
                        <p>Great job completing the diagnostic test! Your responses will help us understand your learning needs better.</p>
                    </div>
                    <div class="action-buttons">
                        <button class="action-button" id="submitBtn">Submit Results</button>
                    </div>
                </div>
            `;
            container.appendChild(screen);

            document.getElementById('submitBtn').addEventListener('click', handleSubmit);
        }

        function handleOptionSelect(e) {
            const option = e.currentTarget;
            const optionIndex = parseInt(option.dataset.option);

            // Remove previous selection
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));

            // Select new option
            option.classList.add('selected');

            // Save answer
            const key = `${state.currentSection}_${state.currentQuestion}`;
            state.answers[key] = optionIndex;
            saveState();
        }

        function handleWritingInput(e) {
            const text = e.target.value;
            const key = `${state.currentSection}_${state.currentQuestion}`;
            state.writingAnswers[key] = text;
            saveState();
        }

        function handleBack() {
            if (state.currentScreen === 'question') {
                if (state.currentQuestion > 0) {
                    state.currentQuestion--;
                } else if (state.currentSection > 0) {
                    state.currentSection--;
                    state.currentQuestion = SECTIONS[state.currentSection].questionCount - 1;
                    state.currentScreen = 'question';
                } else {
                    state.currentScreen = 'welcome';
                }
            } else if (state.currentScreen === 'sectionIntro') {
                if (state.currentSection > 0) {
                    state.currentSection--;
                    state.currentScreen = 'question';
                    state.currentQuestion = SECTIONS[state.currentSection].questionCount - 1;
                } else {
                    state.currentScreen = 'welcome';
                }
            }
            saveState();
            renderScreen();
        }

        function handleNext() {
            if (state.currentScreen === 'welcome') {
                state.currentScreen = 'sectionIntro';
                state.currentSection = 0;
                state.currentQuestion = 0;
                state.startTime = Date.now();
                state.sectionStartTimes[0] = Date.now();
                state.sectionTimeLimits[0] = SECTIONS[0].timeLimit;
            } else if (state.currentScreen === 'sectionIntro') {
                state.currentScreen = 'question';
            } else if (state.currentScreen === 'question') {
                const section = SECTIONS[state.currentSection];
                if (state.currentQuestion < section.questionCount - 1) {
                    state.currentQuestion++;
                } else if (state.currentSection < SECTIONS.length - 1) {
                    state.currentSection++;
                    state.currentQuestion = 0;
                    state.currentScreen = 'sectionIntro';
                    state.sectionStartTimes[state.currentSection] = Date.now();
                    state.sectionTimeLimits[state.currentSection] = SECTIONS[state.currentSection].timeLimit;
                } else {
                    state.currentScreen = 'completion';
                }
            }
            saveState();
            renderScreen();
        }

        function handleSubmit() {
            submitResults();
        }

        function updateStatusBar() {
            const statusSection = document.getElementById('statusSection');
            const statusTimer = document.getElementById('statusTimer');

            if (state.currentScreen === 'welcome') {
                statusSection.textContent = 'Welcome';
                statusTimer.textContent = '--:--';
            } else if (state.currentScreen === 'completion') {
                statusSection.textContent = 'Completed';
                statusTimer.textContent = '--:--';
            } else if (state.currentScreen === 'sectionIntro') {
                const section = SECTIONS[state.currentSection];
                statusSection.textContent = `Section ${state.currentSection + 1}: ${section.title}`;
                statusTimer.textContent = `${Math.floor(section.timeLimit / 60)}:00`;
            } else {
                const section = SECTIONS[state.currentSection];
                statusSection.textContent = `Section ${state.currentSection + 1}: ${section.title}`;

                const sectionStartTime = state.sectionStartTimes[state.currentSection];
                if (sectionStartTime) {
                    const elapsed = Math.floor((Date.now() - sectionStartTime) / 1000);
                    const timeLimit = SECTIONS[state.currentSection].timeLimit;
                    const remaining = Math.max(0, timeLimit - elapsed);
                    const minutes = Math.floor(remaining / 60);
                    const seconds = remaining % 60;

                    statusTimer.textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
                    statusTimer.classList.remove('warning', 'critical');
                    if (remaining < 60) {
                        statusTimer.classList.add('critical');
                    } else if (remaining < 180) {
                        statusTimer.classList.add('warning');
                    }
                }
            }
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progressBar');
            if (state.currentScreen === 'welcome' || state.currentScreen === 'completion') {
                progressBar.style.width = state.currentScreen === 'completion' ? '100%' : '0%';
            } else if (state.currentScreen === 'sectionIntro') {
                const progress = (state.currentSection / SECTIONS.length) * 100;
                progressBar.style.width = progress + '%';
            } else {
                let totalQuestions = 0;
                let currentQuestion = 0;
                for (let i = 0; i < SECTIONS.length; i++) {
                    totalQuestions += SECTIONS[i].questionCount;
                    if (i < state.currentSection) {
                        currentQuestion += SECTIONS[i].questionCount;
                    }
                }
                currentQuestion += state.currentQuestion + 1;
                const progress = (currentQuestion / totalQuestions) * 100;
                progressBar.style.width = progress + '%';
            }
        }

        function updateNavButtons() {
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');

            backBtn.disabled = state.currentScreen === 'welcome';
            nextBtn.textContent = state.currentScreen === 'completion' ? 'Done' : 'Next';

            if (state.currentScreen === 'completion') {
                backBtn.style.display = 'none';
            } else {
                backBtn.style.display = 'block';
            }
        }

        function updateQuestionCounter() {
            const counter = document.getElementById('questionCounter');
            if (state.currentScreen === 'question') {
                const section = SECTIONS[state.currentSection];
                counter.textContent = `${state.currentQuestion + 1} of ${section.questionCount}`;
            } else {
                counter.textContent = '';
            }
        }

        function startTimer() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                updateStatusBar();
            }, 1000);
        }

        function collectAnswers() {
            const answers = [];
            SECTIONS.forEach((section, sectionIdx) => {
                section.questions.forEach((question, qIdx) => {
                    const key = `${sectionIdx}_${qIdx}`;
                    if (question.type === 'writing') {
                        answers.push({
                            section: sectionIdx,
                            question: qIdx,
                            text: question.text,
                            answer: state.writingAnswers[key] || '',
                            type: 'writing'
                        });
                    } else {
                        answers.push({
                            section: sectionIdx,
                            question: qIdx,
                            text: question.text,
                            selectedOption: state.answers[key] !== undefined ? state.answers[key] : -1,
                            selectedText: state.answers[key] !== undefined ? question.options[state.answers[key]] : 'Not answered',
                            correctOption: question.correct,
                            correctText: question.options[question.correct],
                            type: 'multiple-choice'
                        });
                    }
                });
            });
            return answers;
        }

        async function submitResults() {
            const answers = collectAnswers();
            const totalSeconds = Math.round((Date.now() - state.startTime) / 1000);
            const totalQuestions = SECTIONS.reduce((sum, section) => sum + section.questionCount, 0);
            const answeredQuestions = Object.keys(state.answers).length + Object.keys(state.writingAnswers).length;

            const payload = {
                student: CONFIG.student,
                grade: CONFIG.grade,
                testId: CONFIG.testId,
                testLabel: CONFIG.testLabel,
                timestamp: new Date().toISOString(),
                answers: answers,
                summary: {
                    totalQuestions: totalQuestions,
                    answeredQuestions: answeredQuestions,
                    totalTimeSeconds: totalSeconds,
                    effortScore: Math.round((answeredQuestions / totalQuestions) * 100)
                }
            };

            try {
                const response = await fetch(CONFIG.webAppUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                console.log('Results submitted');
                creditDiagnosticPoints();
            } catch (e) {
                console.log('Submission failed, trying offline storage');
                try {
                    localStorage.setItem('diagnosticTestResults', JSON.stringify(payload));
                    creditDiagnosticPoints();
                } catch (e2) {
                    console.log('Could not save results');
                }
            }
        }

        function creditDiagnosticPoints() {
            console.log('Crediting 15 diagnostic points to ' + CONFIG.student);

            // Write localStorage signal for dashboard to detect
            const today = new Date().toISOString().split('T')[0];
            const signal = {
                completed: true,
                timestamp: new Date().toISOString(),
                date: today,
                testId: CONFIG.testId,
                testLabel: CONFIG.testLabel,
                points: 15
            };
            localStorage.setItem('jacob_diagnostic_signal', JSON.stringify(signal));

            // Also mark daily tasks complete for today (diagnostic replaces daily stack)
            const dashKey = 'jacob_dashboard_v3';
            try {
                const dashData = JSON.parse(localStorage.getItem(dashKey) || '{}');
                if (!dashData.days) dashData.days = {};
                if (!dashData.days[today]) dashData.days[today] = {};
                dashData.days[today].session = true;
                dashData.days[today].khan = true;
                dashData.days[today].reading = true;
                dashData.days[today].diagnosticComplete = true;
                dashData.days[today].diagnosticPoints = 15;
                localStorage.setItem(dashKey, JSON.stringify(dashData));
            } catch(e) { console.log('Could not update dashboard data'); }

            // POST completeDiagnosticTest to Apps Script
            try {
                fetch(CONFIG.webAppUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'completeDiagnosticTest',
                        student: CONFIG.student,
                        testId: CONFIG.testId,
                        date: today,
                        points: 15
                    })
                });
            } catch(e) { console.log('Points POST failed'); }

            // Show completion message and redirect
            if (confirm(`Great work, Jacob! Your diagnostic test is complete.\n\n15 points have been credited!\n\nTap OK to return to your dashboard.`)) {
                window.location.href = 'Jacob_Dashboard.html';
            }
        }

        // Start the application
        window.addEventListener('load', init);
    </script>
</body>
</html>
