<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary-gold: #c9a84c;
            --dark-brown: #1a1510;
            --light-brown: #2a2420;
            --accent-gold: #e8d4a0;
            --text-light: #f5f1e8;
            --text-muted: #b8a98a;
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: Georgia, serif;
            background-color: var(--dark-brown);
            color: var(--text-light);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Progress and Timer Bars */
        .progress-bar {
            background: linear-gradient(90deg, var(--primary-gold), var(--accent-gold));
            height: 8px;
            width: 0%;
            transition: width 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .status-bar {
            background-color: var(--light-brown);
            border-bottom: 2px solid var(--primary-gold);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            position: fixed;
            top: 8px;
            left: 0;
            right: 0;
            z-index: 99;
        }

        .section-label {
            color: var(--accent-gold);
            font-weight: bold;
        }

        .timer {
            color: var(--primary-gold);
            font-weight: bold;
            min-width: 60px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 50px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Welcome Screen */
        .welcome-screen {
            text-align: center;
        }

        .welcome-screen h1 {
            font-size: 48px;
            color: var(--primary-gold);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .welcome-screen .subtitle {
            font-size: 18px;
            color: var(--accent-gold);
            margin-bottom: 30px;
        }

        .welcome-screen p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .welcome-screen .highlight {
            color: var(--primary-gold);
            font-weight: bold;
        }

        /* Section Intro */
        .section-intro {
            text-align: center;
        }

        .section-intro h2 {
            font-size: 36px;
            color: var(--primary-gold);
            margin-bottom: 20px;
        }

        .section-intro .instructions {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-intro .question-count {
            color: var(--accent-gold);
            font-size: 16px;
            margin-top: 20px;
        }

        /* Question Display */
        .question-container {
            display: flex;
            flex-direction: column;
        }

        .question-header {
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .question-text sup {
            font-size: 12px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-button {
            background-color: var(--light-brown);
            border: 2px solid var(--primary-gold);
            color: var(--text-light);
            padding: 14px 16px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-family: Georgia, serif;
        }

        .option-button:active {
            background-color: var(--primary-gold);
            color: var(--dark-brown);
            transform: scale(0.98);
        }

        .option-button.selected {
            background-color: var(--primary-gold);
            color: var(--dark-brown);
            border-color: var(--accent-gold);
        }

        /* Writing Response */
        .writing-container {
            margin-top: 20px;
        }

        .writing-label {
            font-size: 14px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .writing-input {
            width: 100%;
            min-height: 100px;
            background-color: var(--light-brown);
            border: 2px solid var(--primary-gold);
            color: var(--text-light);
            padding: 12px;
            border-radius: 6px;
            font-family: Georgia, serif;
            font-size: 14px;
            resize: vertical;
        }

        .writing-input::placeholder {
            color: var(--text-muted);
        }

        /* Navigation Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: 2px solid var(--primary-gold);
            background-color: transparent;
            color: var(--primary-gold);
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: Georgia, serif;
            font-weight: bold;
        }

        .btn:active {
            background-color: var(--primary-gold);
            color: var(--dark-brown);
        }

        .btn.primary {
            background-color: var(--primary-gold);
            color: var(--dark-brown);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Completion Screen */
        .completion-screen {
            text-align: center;
        }

        .completion-screen h2 {
            font-size: 40px;
            color: var(--primary-gold);
            margin-bottom: 20px;
        }

        .completion-screen .message {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .effort-metrics {
            background-color: var(--light-brown);
            border: 2px solid var(--primary-gold);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--primary-gold);
            font-size: 14px;
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: var(--accent-gold);
        }

        .metric-value {
            color: var(--primary-gold);
            font-weight: bold;
        }

        .tutor-message {
            background-color: rgba(201, 168, 76, 0.1);
            border-left: 4px solid var(--primary-gold);
            padding: 16px;
            margin-top: 20px;
            border-radius: 4px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .tutor-name {
            color: var(--primary-gold);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .tutor-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-light);
        }

        /* Scrollbar styling */
        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--primary-gold);
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .status-bar {
                font-size: 12px;
                padding: 10px 12px;
            }

            .welcome-screen h1 {
                font-size: 36px;
            }

            .section-intro h2 {
                font-size: 28px;
            }

            .question-text {
                font-size: 15px;
            }

            .option-button {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>

            <h3>Roman Roads: Engineering Marvels of the Ancient World</h3>
            <p>The Roman Empire's dominance across Europe, North Africa, and the Middle East would not have been possible without a revolutionary advancement in transportation infrastructure. Roman roads, known as "viae," represented some of the most sophisticated engineering accomplishments of the ancient world. These weren't merely paths for travel; they were the arteries of imperial commerce, military movement, and administrative control.</p>

            renderQuestion();
        }

        function saveWritingAnswer() {
            const section = getCurrentSection();
            const text = document.getElementById('writingInput').value;
            sectionAnswers[section.id][currentQuestionIndex] = text;
            saveToLocalStorage();
        }

        function nextQuestion() {
            const section = getCurrentSection();
            const questions = getCurrentQuestions();

            // Save answer if not already saved
            const currentAnswer = sectionAnswers[section.id][currentQuestionIndex];
            if (currentAnswer !== null && currentAnswer !== undefined && currentAnswer !== '') {
                // Answer is recorded
            }

            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                saveToLocalStorage();
                renderQuestion();
            } else {
                // Move to next section
                if (currentSectionIndex < SECTIONS.length - 1) {
                    currentSectionIndex++;
                    currentQuestionIndex = 0;
                    saveToLocalStorage();
                    renderSectionIntro();
                } else {
                    // Test complete
                    compileResults();
                    renderCompletionScreen();
                }
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                saveToLocalStorage();
                renderQuestion();
            }
        }

        function nextToQuestion() {
            currentQuestionIndex = 0;
            renderQuestion();
        }

        function previousSection() {
            if (currentSectionIndex > 0) {
                currentSectionIndex--;
                currentQuestionIndex = 0;
                saveToLocalStorage();
                renderSectionIntro();
            } else {
                renderWelcomeScreen();
            }
        }

        function compileResults() {
            allAnswers = [];
            const questionsMap = getAllSectionQuestions();

            SECTIONS.forEach((section, sectionIdx) => {
                const questions = questionsMap[section.id];
                const answers = sectionAnswers[section.id];

                questions.forEach((question, qIdx) => {
                    const selectedAnswer = answers[qIdx];
                    if (selectedAnswer !== null && selectedAnswer !== undefined) {
                        allAnswers.push({
                            section: section.id,
                            sectionName: section.name,
                            questionIndex: qIdx,
                            question: question.question,
                            standard: question.standard,
                            difficulty: question.difficulty || 'N/A',
                            type: question.type,
                            selectedAnswer: selectedAnswer,
                            selectedText: question.type === 'mc' ? question.options[selectedAnswer] : selectedAnswer,
                            correctAnswer: question.type === 'mc' ? question.correct : null,
                            correctText: question.type === 'mc' ? question.options[question.correct] : 'N/A'
                        });
                    }
                });
            });
        }

        function submitResults() {
            const payload = {
                action: 'saveDiagnosticResults',
                student: CONFIG.student,
                grade: CONFIG.grade,
                testId: CONFIG.testId,
                testLabel: CONFIG.testLabel,
                timestamp: new Date().toISOString(),
                answers: allAnswers,
                summary: {
                    totalQuestions: Object.values(getAllSectionQuestions()).reduce((sum, qs) => sum + qs.length, 0),
                    answeredQuestions: allAnswers.length,
                    totalTimeSeconds: elapsedSeconds,
                    effortScore: Math.round((allAnswers.length / Object.values(getAllSectionQuestions()).reduce((sum, qs) => sum + qs.length, 0)) * 100)
                }
            };

            console.log('Submitting:', JSON.stringify(payload, null, 2));

            fetch(CONFIG.webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                console.log('Submission sent to Apps Script');
                localStorage.removeItem('diagnosticState');
            })
            .catch(error => {
                console.error('Submission error:', error);
            });

            // Write localStorage signal for dashboard to detect completion
            const today = new Date().toISOString().split('T')[0];
            const signal = {
                completed: true,
                timestamp: new Date().toISOString(),
                date: today,
                testId: CONFIG.testId,
                testLabel: CONFIG.testLabel,
                points: 15
            };
            localStorage.setItem('jacob_diagnostic_week2_signal', JSON.stringify(signal));
            localStorage.setItem('jacob_diagnostic_signal', JSON.stringify(signal));

            // Also update dashboard local data so tasks show as complete
            const dashKey = 'jacob_dashboard_v3';
            try {
                const dashData = JSON.parse(localStorage.getItem(dashKey) || '{}');
                if (!dashData.days) dashData.days = {};
                if (!dashData.days[today]) dashData.days[today] = {};
                dashData.days[today].session = true;
                dashData.days[today].khan = true;
                dashData.days[today].reading = true;
                dashData.days[today].diagnosticComplete = true;
                dashData.days[today].diagnosticPoints = 15;
                localStorage.setItem(dashKey, JSON.stringify(dashData));
            } catch(e) { console.log('Could not update dashboard data'); }

            // POST completeDiagnosticTest to Apps Script for points
            try {
                fetch(CONFIG.webAppUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'completeDiagnosticTest',
                        student: CONFIG.student,
                        testId: CONFIG.testId,
                        date: today,
                        points: 15
                    })
                });
            } catch(e) { console.log('Points POST failed'); }

            alert('Your test has been submitted! Gary will review your responses. Head back to your dashboard.');
        }

        // ==================== INITIALIZATION ====================

        window.addEventListener('beforeunload', () => {
            if (currentState !== 'welcome' && currentState !== 'completion') {
                saveToLocalStorage();
            }
        });

        // Start the app
        renderWelcomeScreen();
    </script>
</body>
</html>
