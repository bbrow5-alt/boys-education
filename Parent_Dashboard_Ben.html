<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Mind Academy — Parent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111827; color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            background-color: #1f2937; border: 1px solid #374151; border-radius: 16px;
            padding: 48px 40px; max-width: 420px; width: 90%; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .lock-icon { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 32px; }
        .input-group { position: relative; margin-bottom: 20px; }
        input[type="password"] {
            width: 100%; padding: 14px 16px; background-color: #111827;
            border: 2px solid #374151; border-radius: 10px; color: #f3f4f6;
            font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #4fc3f7; }
        input[type="password"]::placeholder { color: #6b7280; }
        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #111827; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:active { transform: scale(0.98); }
        .remember-row {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; margin-bottom: 20px; font-size: 13px; color: #9ca3af;
        }
        .error-msg {
            color: #ef4444; font-size: 14px; margin-top: 16px; display: none;
        }
        .footer-note {
            color: #4b5563; font-size: 11px; margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="lock-icon">&#128274;</div>
        <h1>Parent Dashboard</h1>
        <p class="subtitle">Enter the password to access the dashboard</p>
        <form id="passwordForm" onsubmit="return handleSubmit(event)">
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" autofocus>
            </div>
            <div class="remember-row">
                <input type="checkbox" id="rememberCheck" checked>
                <label for="rememberCheck">Remember for this session</label>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Unlock Dashboard</button>
        </form>
        <p class="error-msg" id="errorMsg">Incorrect password. Please try again.</p>
        <p class="footer-note">Password protected &middot; Iron Mind Academy</p>
    </div>

    <script>
        // SHA-256 hash of the correct password
        const CORRECT_HASH = '2f4e686b4400f90a08f5a4b138321aa6ac76a132cef59ba091b2a74d2630bf2b';

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256',
                new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Check if already authenticated this session
        (async function checkSession() {
            const saved = sessionStorage.getItem('pd_auth');
            if (saved) {
                const hash = await sha256(saved);
                if (hash === CORRECT_HASH) {
                    window.location.href = 'Parent_Dashboard_Content.html';
                }
            }
        })();

        async function handleSubmit(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            if (!password) return false;

            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            await new Promise(r => setTimeout(r, 50));

            const hash = await sha256(password);

            if (hash === CORRECT_HASH) {
                if (document.getElementById('rememberCheck').checked) {
                    try { sessionStorage.setItem('pd_auth', password); } catch(e) {}
                }
                window.location.href = 'Parent_Dashboard_Content.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                btn.textContent = 'Unlock Dashboard';
                btn.disabled = false;
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }

            return false;
        }
    </script>
</body>
</html>
