<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Protected</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background-color: #111827;
            border: 2px solid #374151;
            border-radius: 10px;
            color: #f3f4f6;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: #4fc3f7;
        }

        input[type="password"]::placeholder {
            color: #6b7280;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #111827;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }

        .remember-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #9ca3af;
        }

        .remember-group input[type="checkbox"] {
            accent-color: #4fc3f7;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginBox">
        <div class="lock-icon">&#128274;</div>
        <h1>Parent Dashboard</h1>
        <p class="subtitle">Enter the password to access the dashboard</p>
        <form id="passwordForm" onsubmit="return handleSubmit(event)">
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" autofocus>
            </div>
            <div class="remember-group">
                <input type="checkbox" id="rememberCheck">
                <label for="rememberCheck">Remember on this device</label>
            </div>
            <button type="submit" class="submit-btn">Unlock Dashboard</button>
        </form>
        <p class="error-msg" id="errorMsg">Incorrect password. Please try again.</p>
        <p class="footer-note">AES-256 encrypted &middot; Password required</p>
    </div>

            iterations: 100000

        // Convert base64 to ArrayBuffer
        function b64ToBuffer(b64) {
            const binary = atob(b64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // Derive key using PBKDF2 (Web Crypto API)
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveBits']
            );

            const derivedBits = await crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: ENCRYPTED_DATA.iterations,
                    hash: 'SHA-256'
                },
                keyMaterial,
                256
            );

            return derivedBits;
        }

        // Decrypt AES-256-CBC
        async function decrypt(password) {
            try {
                const salt = b64ToBuffer(ENCRYPTED_DATA.salt);
                const iv = b64ToBuffer(ENCRYPTED_DATA.iv);
                const ciphertext = b64ToBuffer(ENCRYPTED_DATA.ciphertext);

                // Derive key
                const keyBits = await deriveKey(password, salt);

                // Import as AES-CBC key
                const key = await crypto.subtle.importKey(
                    'raw',
                    keyBits,
                    { name: 'AES-CBC' },
                    false,
                    ['decrypt']
                );

                // Decrypt
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv: iv },
                    key,
                    ciphertext
                );

                // Decode UTF-8
                const decoder = new TextDecoder();
                return decoder.decode(decrypted);
            } catch (e) {
                return null;
            }
        }

        // Handle form submission
        async function handleSubmit(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            if (!password) return false;

            const btn = document.querySelector('.submit-btn');
            btn.textContent = 'Decrypting...';
            btn.disabled = true;

            // Small delay to let UI update
            await new Promise(r => setTimeout(r, 50));

            const html = await decrypt(password);

            if (html && html.includes('<!DOCTYPE html>') || html && html.includes('<html')) {
                // Save password if "remember" checked
                if (document.getElementById('rememberCheck').checked) {
                    try {
                        sessionStorage.setItem('pd_auth', password);
                    } catch(e) {}
                }

                // Replace entire page with decrypted content
                document.open();
                document.write(html);
                document.close();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                btn.textContent = 'Unlock Dashboard';
                btn.disabled = false;
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }

            return false;
        }

        // Check for saved session
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const saved = sessionStorage.getItem('pd_auth');
                if (saved) {
                    const html = await decrypt(saved);
                    if (html && (html.includes('<!DOCTYPE html>') || html.includes('<html'))) {
                        document.open();
                        document.write(html);
                        document.close();
                        return;
                    }
                }
            } catch(e) {}
        });
    </script>
