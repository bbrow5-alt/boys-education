<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob's Dashboard</title>
<style>
  body { margin:0; background:#1a1510; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .icon { font-size:2.5rem; margin-bottom:12px; }
  .title { color:#d4a843; font-size:1.1rem; letter-spacing:3px; text-transform:uppercase; }
  .bar { margin-top:16px; width:120px; height:3px; background:#333; border-radius:2px; overflow:hidden; }
  .fill { width:100%; height:100%; background:#d4a843; animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
</style>
<script>
  // Always redirect to the real dashboard with a cache-busting timestamp
  window.location.replace('Jacob_Dashboard.html?_t=' + Date.now());
</script>
</head>
<body>
  <div class="icon">&#127963;</div>
  <div class="title">Loading The Architect's Log...</div>
  <div class="bar"><div class="fill"></div></div>
</body>
</html>
